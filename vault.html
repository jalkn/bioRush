<style>
    /* VARIABLES ACROMÁTICAS DE ENTORNO MATRICIAL */
    :root[data-theme="dark"] {
        --jako-bg: rgba(18, 35, 162, 0.92);
        --jako-text: #ffffff;
        --jako-border: rgba(255, 255, 255, 0.02);
        --jako-glass: rgba(0, 0, 0, 0.5);
        --jako-led: rgba(255, 255, 255, 0.65);
        --gradient-start: rgba(255, 255, 255, 0.03);
        --gradient-mid: rgba(5, 5, 8, 0.85);
        --gradient-end: #000000;
        --toggle-handle-transform: translate(28px, 3px);
    }
    :root[data-theme="white"] {
        --jako-bg: #f8f9fa;
        --jako-text: #000000;
        --jako-border: rgba(0, 0, 0, 0.08);
        --jako-glass: rgba(255, 255, 255, 0.4);
        --jako-led: rgba(0, 0, 0, 0.75);
        --gradient-start: rgba(0, 0, 0, 0.02);
        --gradient-mid: rgba(248, 249, 250, 0.85);
        --gradient-end: #ffffff;
        --toggle-handle-transform: translate(3px, 3px);
    }

/* MOTOR BASE DE LA INTERFAZ */
    body { 
        scroll-behavior: smooth; 
        letter-spacing: 0.05em;  
        overscroll-behavior: none;
        background-color: var(--jako-bg);
        color: var(--jako-text);
        transition: background-color 0.5s ease, color 0.5s ease;
    }

    #page-bg-overlay {
        position: fixed;
        inset: 0;
        /* Foco centralizado de manera aséptica en 50% 50% para equilibrar el HUD */
        background: radial-gradient(circle at 50% 50%, var(--gradient-start) 15%, var(--gradient-mid) 80%, var(--gradient-end) 100%);
        z-index: -1;
        transform: translateZ(0);

        will-change: background;
        transition: background 0.6s cubic-bezier(0.25, 1, 0.5, 1);
    }

    /* VIDRIO HIPERREALISTA SIMÉTRICO Y ULTRA TRANSLÚCIDO */
    .glass { 
        background: var(--jako-glass);
        border: 1px solid var(--jako-border); 
        backdrop-filter: blur(16px); 
        -webkit-backdrop-filter: blur(16px);
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.05), inset 0 1px 0 var(--jako-border);
        transform: translateZ(0);
        transition: background 0.5s ease, border-color 0.5s ease;
    }

    header.glass { 
        background: transparent !important;
        border-bottom: 1px solid var(--jako-border); 
        backdrop-filter: blur(4px); 
        -webkit-backdrop-filter: blur(4px);
        box-shadow: none;
    }

    /* SISTEMA DE INTERFAZ HUD HIPERREALISTA (ASÉPTICO) */
    .hud-btn-hyper {
        background: transparent !important;
        border: 1px solid transparent !important;
        box-shadow: none !important;
        backdrop-filter: none !important;
        -webkit-backdrop-filter: none !important;
    }

    /* Agrupación de herencia de color de texto HUD */
    .hud-btn-hyper span,
    .hud-btn-hyper button span,
    #menu-bio-DYNAMIC-holder span,
    #menu-bio-DYNAMIC-holder-header span {
        color: var(--jako-text) !important;
        text-shadow: none !important;
        transition: opacity 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* Forzado de opacidad base en LED activo */
    .hud-btn-hyper .active-led,
    #menu-bio-DYNAMIC-holder .active-led,
    #menu-bio-DYNAMIC-holder-header .active-led {
        opacity: 1 !important;
    }

    /* Emisión LED sutil según data-theme */
    :root[data-theme="dark"] .active-led {
        text-shadow: 0 0 10px var(--jako-led), 0 0 4px var(--jako-led) !important;
    }

    :root[data-theme="white"] .active-led {
        text-shadow: 0 0 6px var(--jako-led) !important;
    }

    .border-custom { 
        border-color: var(--jako-border); 
        transition: border-color 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .border-custom:hover { border-color: var(--jako-text); }

    .tele-value { 
        color: var(--jako-text); 
        text-shadow: 0 0 14px var(--jako-led), 0 0 4px var(--jako-led);
        transform: translateZ(0);
        transition: color 0.5s ease, text-shadow 0.5s ease;
    } 

    .img-glow-transition {
        transition: filter 0.5s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.5s ease, transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        backface-visibility: hidden;
        -webkit-backface-visibility: hidden;
        transform: translate3d(0, 0, 0);
        will-change: filter, transform, opacity;
    }

    /* OCULTAMIENTO ASÉPTICO DE SCROLLS */
    .custom-hud-scroll::-webkit-scrollbar { 
        display: none; 
        width: 0 !important;
        height: 0 !important;
    }
    .custom-hud-scroll { 
        -ms-overflow-style: none; 
        scrollbar-width: none; 
    }

    button, span, div {
        -webkit-tap-highlight-color: transparent;
    }

    /* COMPORTAMIENTO MODO ZENITH (RAW) */
    .zenith-active header,
    .zenith-active footer {
        opacity: 0 !important;
        pointer-events: none !important;
    }

    .zenith-active header { transform: translateY(-10px); }
    .zenith-active footer { transform: translateY(10px); }

    .zenith-active main {
        padding: 0 !important;
        transition: padding 0.6s cubic-bezier(0.25, 1, 0.5, 1);
    }

    .zenith-active #artepanel-pack-container {
        transform: scale(1.12);
        filter: drop-shadow(0 35px 80px rgba(0,0,0,0.95));

    /* Suavizado global de UI HUD */
    header, footer, #artepanel-pack-container {
        transition: opacity 0.5s cubic-bezier(0.4, 0, 0.2, 1), transform 0.5s cubic-bezier(0.4, 0, 0.2, 1), filter 0.5s ease;
    }
</style>

    function renderBiokineticWaves() {
        const container = getCachedEl('wave-quantum-container');
        if (!container || biokineticWaveHistory.length === 0) return;

        let htmlContent = '';
        biokineticWaveHistory.forEach((dial, tIndex) => {
            const currentScale = tIndex * (3 / 3); 
            const baseOpacity = isDialTextRevealed ? 0.05 : (1.0 - (tIndex * 0.08));
            if (baseOpacity <= 0) return;

            const viewFactor = 18; 
            const layers = [
                { id: 'internal',     r: (currentScale * 1.0) * viewFactor, opacity: baseOpacity * 0.70, value: dial.sets },
                { id: 'intermediate', r: (currentScale * 1.4) * viewFactor, opacity: baseOpacity * 0.55, value: dial.vector },
                { id: 'external',     r: (currentScale * 1.8) * viewFactor, opacity: baseOpacity * 0.40, value: dial.reps }
            ];

            layers.forEach(layer => {
                if (layer.r <= 0) return;
                const circumference = 2 * Math.PI * layer.r;
                const angle = (layer.value - 1) * 30; 
                const arcLength = (layer.value / 12) * circumference;
                const dashArray = `${arcLength} ${circumference}`;

                htmlContent += `
                    <circle 
                        id="wave-${layer.id}-t${tIndex}" 
                        cx="200" 
                        cy="200" 
                        r="${layer.r}" 
                        transform="rotate(${angle} 200 200)"
                        class="stroke-current"
                        stroke-width="${tIndex === 0 ? 1.5 : 1.0}"
                        stroke-opacity="${layer.opacity}"
                        stroke-dasharray="${dashArray}"
                        stroke-linecap="round"
                        fill="none"
                        style="will-change: r, stroke-opacity, stroke-dasharray;"
                    />`;
            });
        });
        container.innerHTML = htmlContent;
    }

    function calculateSphereIndex() {
        const now = new Date();
        const epoch = new Date('2012-12-21T00:00:00Z');
        const daysSinceEpoch = Math.floor((now - epoch) / 86400000);
        const currentHour = now.getHours();
        const sphereQuadrant = Math.floor(currentHour / 6);
        return `${String((daysSinceEpoch * 4) + sphereQuadrant).padStart(4, '0')}`;
    }

    function updateZ() {
        const now = new Date();
        const hours = now.getHours(); 
        const minutes = now.getMinutes();
        const seconds = now.getSeconds();

        if (!window.isDialFrozen) {
            let setsStage = 1;  
            let repsStage = 1;  
            let currentAction = 'P'; 

            if (seconds % 2 !== 0) {
                const progress1s = now.getMilliseconds() / 1000; 
                setsStage = Math.floor(progress1s * 12) + 1;
                repsStage = 13 - setsStage; 
                if (progress1s < 0.25) currentAction = 'P';
                else if (progress1s < 0.5) currentAction = 'U';
                else if (progress1s < 0.75) currentAction = 'L';
                else currentAction = 'S';
            } else {
                setsStage = Math.floor((minutes % 12) + 1);
                if (seconds < 30) {
                    const subSlot = Math.floor((seconds % 30) / 7.5);
                    currentAction = ["PL", "PU", "LU", "SU"][subSlot] || "PL";
                    repsStage = Math.floor((seconds % 10) + 2);
                } else {
                    const subSlot = Math.floor(((seconds - 30) % 30) / 7.5);
                    currentAction = ["PUL", "LPS", "SPU", "ULS"][subSlot] || "ULS";
                    repsStage = Math.floor(((seconds - 30) % 10) + 3);
                }
            }
            
            setsStage = Math.max(1, Math.min(12, setsStage));
            repsStage = Math.max(1, Math.min(12, repsStage));
            const biokineticCoordinate = `${setsStage}${currentAction}${repsStage}`;
            const vectorIndex = VECTOR_TO_CLOCK_INDEX[currentAction] || 1;

            const lastSavedDial = biokineticWaveHistory[0];
            if (!lastSavedDial || lastSavedDial.rawCoord !== biokineticCoordinate) {
                biokineticWaveHistory.unshift({ sets: setsStage, vector: vectorIndex, reps: repsStage, rawCoord: biokineticCoordinate });
                if (biokineticWaveHistory.length > 12) biokineticWaveHistory.pop();
            }

            renderBiokineticWaves();

            const elDial = getCachedEl('z-dial');
            if (elDial) elDial.textContent = biokineticCoordinate;
            
            const sandwatchGroup = getCachedEl('sandwatch-group');
            if (sandwatchGroup) {
                sandwatchGroup.style.opacity = isDialTextRevealed ? "1" : "0";
                sandwatchGroup.style.pointerEvents = isDialTextRevealed ? "auto" : "none";
            }
                    
            const subSetsSolar = getCachedEl('sub-sets-solar');
            const subRepsTension = getCachedEl('sub-reps-tension');
            if (subSetsSolar) subSetsSolar.textContent = `${(0.05 + (setsStage / 240)).toFixed(3)}`;
            if (subRepsTension) subRepsTension.textContent = `${(14.2 + (repsStage * 0.8)).toFixed(1)}`;

            const elDialMirror = getCachedEl('z-dial-mirror');
            if (elDialMirror) elDialMirror.textContent = biokineticCoordinate;
        }
    }

                        targetSpan.classList.remove('text-jako-text');
                        targetSpan.classList.add('text-jako-text/70');
                    }
                }, 8000);
            });
        });

        // --- PROCESAMIENTO GRUPO 2: SIGNIFICADOS LENGUAJE BIOCINÉTICO ---
        Object.keys(PULS_MEANINGS).forEach(id => {
            const el = getCachedEl(id);
            if (!el) return;
            const esHeaderPuro = id.startsWith('sub-');
            const contenedorLed = esHeaderPuro ? el.parentElement : el;

            el.addEventListener('click', () => {
                clearTimeout(globalTimer);
                if (id === 'z-dial-trigger') window.isDialFrozen = true;

                const activeLang = typeof currentLang !== 'undefined' ? currentLang : 'esp';
                const txtOriginalSecondary = VAULT_DICTIONARY[activeLang]?.secondaryTelemetry || "ONDA BIOCINÉTICA REGENERATIVA";

                // Manejo de estados de iluminación activa simétricos
                const targetSpan = (id === 'telemetry-puls-meanings-trigger') ? el.querySelector('span') : null;
                if (targetSpan) {
                    targetSpan.classList.remove('text-jako-text/70');
                    targetSpan.classList.add('text-jako-text');
                } else if (esHeaderPuro) {
                    contenedorLed.classList.remove('text-jako-text/60');
                    contenedorLed.classList.add('text-jako-text');
                } else if (id === 'z-dial-trigger') {
                    el.style.filter = "drop-shadow(0 0 25px var(--jako-led))";
                }
                
                const contenedorPadreTelemetria = telemetryContainer.parentElement;
                if (contenedorPadreTelemetria) {
                    contenedorPadreTelemetria.classList.remove('glass', 'bg-black');
                    contenedorPadreTelemetria.classList.add('bg-transparent');
                }

                // Inyectar el significado (función o string) en el mismo panel central
                const meaningValue = PULS_MEANINGS[id];
                telemetryContainer.innerHTML = typeof meaningValue === 'function' ? meaningValue() : meaningValue;
                
                globalTimer = setTimeout(() => {
                    telemetryContainer.innerHTML = txtOriginalSecondary;
                    if (id === 'z-dial-trigger') { 
                        window.isDialFrozen = false; 
                        el.style.filter = "none"; 
                    }
                    if (targetSpan) {
                        targetSpan.classList.remove('text-jako-text');
                        targetSpan.classList.add('text-jako-text/70');
                    } else if (esHeaderPuro) {
                        contenedorLed.classList.remove('text-jako-text');
                        contenedorLed.classList.add('text-jako-text/60');
                    }
                }, 8000);
            });
        });
    }

    function adquirirNodo() {
        const variantConfig = JAKO_CATALOG[currentBioItem].variants[currentBioVariant];
        const currentCoord = getCachedEl('z-dial')?.textContent || "N/A";
        const currentSphere = calculateSphereIndex();
        const freqValue = getCachedEl('sub-sets-solar')?.textContent || "0.00";
        const tensionValue = getCachedEl('sub-reps-tension')?.textContent || "0.0";
        const dialInterpretation = currentCoord.replace(/(\d+)([A-Z]+)(\d+)/, "$1 FASES, $3 NODOS - ESTADO $2");
        
        const mensaje = `⚡ *ORDEN - ARTEPANEL* ⚡\n\n` +
                        `• *Vector:* ${currentBioItem} ${currentBioVariant}\n` +
                        `• *Carga:* ${variantConfig.spec}\n` +
                        `• *ID:* \`${variantConfig.id}\`\n` +
                        `• *Precio:* ${variantConfig._metaPrice || 'Consultar'}\n\n` +
                        `--- *LENGUAJE P.U.L.S.* ---\n` +
                        `• *Matriz de Configuración:* \`${currentCoord}\`\n` +
                        `• *Análisis de Estado:* ${dialInterpretation}\n` +
                        `• *Lote:* \`${currentSphere}\`\n` +
                        `• *Resonancia:* \`${freqValue}\`\n` +
                        `• *Cohesión:* \`${tensionValue}\`\n\n` +
                        `Activar configuración actual.`;

        triggerHaptic([15, 40, 15]);
        window.open(`https://api.whatsapp.com/send?phone=${numeroCelular}&text=${encodeURIComponent(mensaje)}`, '_blank');
    }

function inicializarModoZenith() {
        const triggerZenith = getCachedEl('footer-fn-right-trigger');
        const indicatorRaw = getCachedEl('footer-raw-indicator');
        const mainVault = getCachedEl('main-vault');
        let isZenithActive = false;

        if (!triggerZenith) return;

        const toggleZenith = (e) => {
            if (e) e.stopPropagation();
            isZenithActive = !isZenithActive;

            if (isZenithActive) {
                document.body.classList.add('zenith-active');
                
                // Forzar scroll superior suave para una lectura e inmersión limpia
                window.scrollTo({ top: 0, behavior: 'smooth' });

                if (indicatorRaw) {
                    indicatorRaw.classList.replace('text-jako-text/20', 'text-jako-text');
                    indicatorRaw.classList.replace('opacity-20', 'opacity-100');
                    indicatorRaw.style.filter = "drop-shadow(0 0 6px var(--jako-led))";
                }
                
                triggerHaptic([40, 15]);
            } else {
                document.body.classList.remove('zenith-active');
                
                if (indicatorRaw) {
                    indicatorRaw.classList.replace('text-jako-text', 'text-jako-text/20');
                    indicatorRaw.classList.replace('opacity-100', 'opacity-20');
                    indicatorRaw.style.filter = "none";
                }
                
                triggerHaptic([15]);
            }
        };


        triggerZenith.addEventListener('click', toggleZenith);

        mainVault.addEventListener('click', (e) => {
            if (isZenithActive && e.target === mainVault) {
                toggleZenith(e);
            }
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && isZenithActive) {
                toggleZenith();
            }
        });
    }

    document.addEventListener('DOMContentLoaded', () => {
        inicializarAlternadorAcromatico();
        inicializarArtepanel();
        updateZ(); 
        setInterval(updateZ, 1000);
        habilitarReveladoTelemetria();
        inicializarAlternadorIdioma();
        inicializarModoZenith();
        
        // Forzar sincronización inicial de la interfaz bio-geométrica
        if (typeof actualizarBioUI === 'function') {
            actualizarBioUI();
        }

        const laserSvg = getCachedEl('laser-vector-target');
        if (laserSvg) laserSvg.style.pointerEvents = 'none'; 

        const zDialSvgText = getCachedEl('z-dial');
        if (zDialSvgText) {
            zDialSvgText.style.cursor = 'pointer';
            zDialSvgText.style.pointerEvents = 'auto'; 
            zDialSvgText.addEventListener('click', (e) => {
                e.stopPropagation();
                getCachedEl('z-dial-trigger')?.click();
            });
        }
    });
</script>
