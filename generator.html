<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>BIORUSH // Asset Exporter</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Plus+Jakarta+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <style>
        /* ESTILO INTEGRAL DEL INDEX */
        body { font-family: 'Orbitron', sans-serif; background-color: #020617; color: white; }
        
        /* El slide debe ser la caja idéntica al diseño de tu web */
        .post-slide { 
            width: 1080px; height: 1350px; 
            background: radial-gradient(circle at 50% 50%, #172554 0%, #0f172a 50%, #020617 100%);
            position: relative; padding: 60px;
        }
        
        /* Estilos de texto del index */
        .telemetry-font { font-family: 'Orbitron', sans-serif; letter-spacing: 0.25em; text-transform: uppercase; }
    </style>
</head>
<body class="flex flex-col items-center p-10">

    <div class="mb-10 w-full max-w-lg bg-black/80 p-6 border border-sky-500/20">
        <input type="text" id="in-title" placeholder="TÍTULO" class="w-full bg-transparent border-b border-white/20 mb-2 uppercase text-xs p-1">
        <textarea id="in-desc" placeholder="DESCRIPCIÓN TÉCNICA" class="w-full bg-transparent border-b border-white/20 mb-4 uppercase text-[10px] p-1"></textarea>
        <button onclick="exportar()" class="w-full bg-sky-900 text-white p-2 text-xs tracking-widest hover:bg-sky-700">GENERAR ASSET SINCRONIZADO</button>
    </div>

    <div id="slide-1" class="post-slide flex flex-col justify-between">
        <header class="border-b border-white/10 pb-6">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 bg-white/10"></div> <span id="out-title" class="text-3xl font-black tracking-[0.25em]">BIORUSH</span>
            </div>
            <p class="text-[10px] tracking-[0.4em] text-white/50 italic mt-2">SINERGIA MOLECULAR ÓPTIMA</p>
        </header>

        <main class="flex-1 flex flex-col items-center justify-center">
            <div class="w-[400px] h-[400px] border border-white/10 rounded-full flex items-center justify-center mb-10">
                <img src="img/maneRaw.png" class="w-64 opacity-90">
            </div>
            <div id="out-desc" class="text-center text-lg tracking-[0.2em] max-w-md text-white/70 font-mono">
                ENFOQUE Y CLARIDAD COGNITIVA
            </div>
        </main>

        <footer class="text-center border-t border-white/10 pt-6">
            <span class="text-[8px] tracking-[0.5em] text-white/30">PROTOCOLO P.U.L.S. // 2026</span>
        </footer>
    </div>

    <script>
        function exportar() {
            // Sincronizar
            document.getElementById('out-title').textContent = document.getElementById('in-title').value;
            document.getElementById('out-desc').textContent = document.getElementById('in-desc').value;
            
            // Exportar solo el div
            html2canvas(document.getElementById('slide-1'), { backgroundColor: null }).then(canvas => {
                const link = document.createElement('a');
                link.download = 'BIORUSH_DATA_EXPORT.png';
                link.href = canvas.toDataURL("image/png");
                link.click();
            });
        }
    </script>
</body>
</html>
