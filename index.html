<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link class="icon" type="image/png" href="img/favicon.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BIORUSH</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Plus+Jakarta+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = { 
            theme: { 
                extend: { 
                    screens: { 'xs': '400px' },
                    colors: { 'jako-black': '#0a0705' },
                    fontFamily: { 
                        'sans': ['Orbitron', 'sans-serif'],
                        'mono': ['Orbitron', 'monospace'],
                        'body': ['Plus Jakarta Sans', 'sans-serif']
                    }
                }
            }
        }
    </script>
 <style>
        body { font-family: 'Orbitron', sans-serif; background-color: #020617; color: #f8fafc; } 
        #page-bg-overlay {
            position: fixed; inset: 0; z-index: -1;
            background: radial-gradient(circle at 50% 50%, #1e3a8a 0%, #0f172a 50%, #020617 100%);
        }
        .tele-label { color: #64748b; }
        .tele-value { color: #38bdf8; }
        .border-custom { border-color: rgba(56, 189, 248, 0.2); }
        .border-custom:hover { border-color: rgba(56, 189, 248, 0.6); }
        .img-glow-transition { transition: opacity 0.6s ease-in-out; }
    </style>
</head>
<body class="antialiased selection:bg-white selection:text-black overflow-x-hidden text-white">

    <div id="page-bg-overlay"></div>
    <div class="fixed inset-0 bg-gradient-to-b from-black/40 via-transparent to-black/40 z-0 pointer-events-none"></div>

    <main id="main-vault" class="w-screen h-screen flex flex-col relative overflow-hidden">
        <header class="h-[80px] shrink-0 bg-gradient-to-b from-black/90 via-black/40 to-transparent backdrop-blur-md z-50 flex flex-col items-center justify-center px-6">
            <div class="flex items-center justify-center gap-3 w-full"> 
                <img src="img/lift.png" alt="Back" class="h-6 w-auto object-contain" />
                <span class="text-[11px] tracking-[0.25em] font-black text-white uppercase">BIORUSH</span>
            </div>
        </header>

        <div class="flex-1 w-full flex flex-col items-center justify-center py-4 px-4 gap-y-4">
            <div id="biorush-pack-container" class="relative w-full max-w-[180px] xs:max-w-[200px] sm:max-w-[240px] md:max-w-[280px] aspect-[13/15] shrink-0 drop-shadow-[0_40px_60px_rgba(0,0,0,0.9)]">
                <div class="w-full h-full relative overflow-hidden bg-transparent">
                    <img id="biorush-pack-img-back" src="img/45mane.png" alt="BioRush Pack Back" class="img-glow-transition absolute inset-0 w-full h-full object-contain opacity-0 pointer-events-none z-0" />
                    <img id="biorush-pack-img" src="img/45caps.png" alt="BioRush Pack Front" class="img-glow-transition absolute inset-0 w-full h-full object-contain pointer-events-auto z-10" />
                    <img id="biorush-pack-img-raw" src="" alt="Raw Content" class="img-glow-transition absolute inset-0 w-full h-full object-contain opacity-0 pointer-events-none z-[5]" />
                    
                    <div class="absolute inset-0 flex items-center justify-center p-2 z-20 pointer-events-none">
                        <svg id="laser-vector-target" viewBox="0 0 400 400" class="w-full h-full fill-none stroke-white/40 stroke-[1.5] transition-all duration-500 origin-center transform scale-[1.3] sm:scale-[1.2]">
                            <defs>
                                <path id="textPath-top" d="M 65,200 A 135,135 0 0,1 335,200" />
                                <path id="textPath-bottom" d="M 65,200 A 135,135 0 0,0 335,200" />
                            </defs>
                            
                            <text class="fill-white font-black text-[12px] sm:text-[10px] tracking-[0.25em] sm:tracking-[0.3em] uppercase transition-all duration-500">
                                <textPath id="laser-variant-title" href="#textPath-top" startOffset="50%" text-anchor="middle">PULSOR FOCUS</textPath>
                            </text>
                            
                            <g class="origin-center transform scale-[1.05]">
                                <path d="M 110,120 L 290,120 L 110,280 L 290,280 Z" class="opacity-20 stroke-[1.2]" />
                                <path d="M 110,120 Q 200,150 290,120" class="opacity-20 stroke-[1.2]" />
                                <path d="M 110,280 Q 200,250 290,280" stroke-dasharray="2 2" class="opacity-20 stroke-[1.2]" />
                                
                                <text x="200" y="165" text-anchor="middle" class="fill-white/30 text-[7px] tracking-[0.3em] font-bold uppercase"></text>
                                <text id="z-dial" x="200" y="210" text-anchor="middle" class="fill-white font-black text-[38px] tracking-[0.4em] font-sans">8UST11</text>
                                <text x="200" y="245" text-anchor="middle" class="fill-white/30 text-[6px] tracking-[0.4em] font-mono"></text>
                            </g>
                            
                            <text class="fill-white/60 font-black text-[12px] sm:text-[10px] tracking-[0.25em] uppercase transition-all duration-500">
                                <textPath id="biorush-description" href="#textPath-bottom" startOffset="50%" text-anchor="middle">Enfoque y claridad cognitiva</textPath>
                            </text>
                        </svg>
                    </div>
                </div>
            </div>
        </div>

        <section class="w-full max-w-sm mx-auto pt-3 pb-3 flex flex-col border-t border-white/5 items-center">
            <div class="grid grid-cols-6 gap-y-1 gap-x-1 w-full px-2 text-center mb-2">
                <span id="sub-sets-solar" class="font-mono text-white/60 tracking-[0.2em] text-[11px] cursor-pointer hover:text-sky-400 transition-colors pb-1">0.00</span>
                <span id="sub-reps-tension" class="font-mono text-white/60 tracking-[0.2em] text-[11px] cursor-pointer hover:text-sky-400 transition-colors pb-1">0.0</span>
                <span id="tele-col" class="font-mono text-white/60 tracking-[0.1em] text-[10px] cursor-pointer hover:text-sky-400 transition-colors pb-1">--</span>
                <span id="tele-fru" class="font-mono text-white/60 tracking-[0.1em] text-[10px] cursor-pointer hover:text-sky-400 transition-colors pb-1">--</span>
                <span id="tele-sec" class="font-mono text-white/60 tracking-[0.1em] text-[10px] cursor-pointer hover:text-sky-400 transition-colors pb-1">--</span>
                <span id="tele-mol" class="font-mono text-white/60 tracking-[0.1em] text-[10px] cursor-pointer hover:text-sky-400 transition-colors pb-1">--</span>

                <span class="text-[6px] tracking-[0.2em] text-white/40 uppercase">Hz</span>
                <span class="text-[6px] tracking-[0.2em] text-white/40 uppercase">Tensión</span>
                <span class="text-[6px] tracking-[0.2em] text-white/40 uppercase">Siembra</span>
                <span class="text-[6px] tracking-[0.2em] text-white/40 uppercase">Cosecha</span>
                <span class="text-[6px] tracking-[0.2em] text-white/40 uppercase">Secado</span>
                <span class="text-[6px] tracking-[0.2em] text-white/40 uppercase">Precio</span>
            </div>

            <div class="flex flex-col items-center justify-center w-full mt-1">
                <span id="panel-telemetry-puls" class="text-[8px] text-center tracking-[0.5em] text-sky-400 uppercase transition-colors duration-300">ONDAS BIOCINÉTICAS REGENERATIVAS</span>
            </div>
        </section>
<section class="w-full max-w-sm mx-auto px-6 py-4 border-t border-white/5 flex flex-col gap-4">
            <div class="grid grid-cols-3 items-center gap-2 w-full max-w-[240px] mx-auto">
                <button id="btn-reveal-raw" class="w-full h-9 flex items-center justify-center rounded-sm border border-white/10 bg-white/5 hover:border-sky-500/50 hover:bg-sky-500/10 transition-all duration-300 text-[10px] tracking-[0.2em] font-bold text-white/60 hover:text-sky-400 uppercase">
                    Ver
                </button>

                <button onclick="adquirirNodo()" class="w-full h-9 flex items-center justify-center bg-white/10 backdrop-blur-md rounded-sm border border-white/20 hover:border-sky-500/50 hover:bg-sky-500/10 transition-all duration-300 text-[10px] tracking-[0.2em] font-bold text-white/70 hover:text-sky-400 uppercase">
                    Pedir
                </button>

                <div id="biorush-variants-container" class="w-full h-9"></div>
            </div>
        </section>

        <footer class="h-[72px] shrink-0 bg-gradient-to-t from-black/60 via-black/40 to-transparent backdrop-blur-md z-50 flex items-center justify-center">
            <div class="p-6 flex justify-center items-center w-full min-h-[72px]">
                <span class="text-[6px] tracking-[0.6em] font-bold text-white/40 uppercase">POWERED BY JAKO.ART</span>
            </div>
        </footer>
    </main>

<script>
    // =========================================================================
    // 1. CONFIGURACIÓN DE VARIANTES LINEALES EXCLUSIVAS BIORUSH
    // =========================================================================
    const BIORUSH_CATALOG = {
        'FOCUS': { 
            label: 'PULSOR FOCUS', desc: 'Enfoque y claridad cognitiva', 
            spec: 'LION’S MANE', cant: '45X500MGRS', price: '$70MIL', id: 'PULS45F',
            img: 'img/45caps.png', imgBack: 'img/45mane.png', imgRaw: 'img/maneRaw.png',
            telemetry: { COL: '24°', FRU: '18°', SEC: '40°' },
            benefits: ['NEUROGÉNESIS', 'CLARIDAD COGNITIVA', 'MEMORIA FLUIDA', 'OPTIMIZACIÓN SINÁPTICA', 'ENFOQUE PROFUNDO']
        },
        'ZEN': { 
            label: 'PULSOR ZEN', desc: 'Silencio mental óptimo', 
            spec: 'REISHI', cant: '45X500MGRS', price: '$70MIL', id: 'PULS45Z',
            img: 'img/45caps.png', imgBack: 'img/45reishi.png', imgRaw: 'img/reishiRaw.png',
            telemetry: { COL: '22°', FRU: '16°', SEC: '38°' },
            benefits: ['REDUCCIÓN CORTISOL', 'CALMA PROFUNDA', 'REGULACIÓN NERVIOSA', 'DESCANSO REPARADOR', 'ADAPTACIÓN AL ESTRÉS']
        },
        'STAMINA': { 
            label: 'PULSOR STAMINA', desc: 'Potencia celular óptima', 
            spec: 'CORDYCEPS', cant: '45X500MGRS', price: '$70MIL', id: 'PULS45S',
            img: 'img/45caps.png', imgBack: 'img/45cordy.png', imgRaw: 'img/cordyRaw.png',
            telemetry: { COL: '20°', FRU: '15°', SEC: '42°' },
            benefits: ['POTENCIA AERÓBICA', 'ENERGÍA CELULAR (ATP)', 'RESISTENCIA FÍSICA', 'OXIGENACIÓN SANGUÍNEA', 'RECUPERACIÓN RÁPIDA']
        },
        'CORE': { 
            label: 'PULSOR CORE', desc: 'Respuesta inmune óptima', 
            spec: 'TURKEY TAIL', cant: '45X500MGRS', price: '$70MIL', id: 'PULS45C',
            img: 'img/45caps.png', imgBack: 'img/45turkey.png', imgRaw: 'img/turkeyRaw.png',
            telemetry: { COL: '23°', FRU: '19°', SEC: '40°' },
            benefits: ['RESPUESTA INMUNE', 'BIOMA INTESTINAL', 'DEFENSA CELULAR', 'ANTIOXIDANTE', 'PROTECCIÓN SISTÉMICA']
        }
    };

    let currentBioVariant = 'FOCUS';
    const numeroCelular = "573025333130";

    // ==========================================
    // 2. CACHÉ DE ELEMENTOS DE UI
    // ==========================================
    const $ = (id) => document.getElementById(id);
    const cachedElements = {};
    
    function getCachedEl(id) {
        if (!cachedElements[id]) {
            cachedElements[id] = $(id);
        }
        return cachedElements[id];
    }

    const triggerHaptic = (ms) => { if (navigator.vibrate) navigator.vibrate(ms); };

    // ==========================================
    // 3. MOTOR DE ESTADO VISUAL (FRONT -> BACK -> RAW)
    // ==========================================
    function aplicarModoVisual(modo) {
        const front = getCachedEl('biorush-pack-img');
        const back = getCachedEl('biorush-pack-img-back');
        const raw = getCachedEl('biorush-pack-img-raw');
        const svg = getCachedEl('laser-vector-target');

        [front, back, raw].forEach(el => { if(el) el.style.opacity = '0'; });
        
        if (modo === 'front') {
            front.style.opacity = '1'; front.style.zIndex = '10'; back.style.zIndex = '0';
            if (svg) { svg.style.opacity = '1'; svg.style.pointerEvents = 'auto'; }
        } else if (modo === 'back') {
            back.style.opacity = '1'; back.style.zIndex = '10'; front.style.zIndex = '0';
            if (svg) { svg.style.opacity = '0'; svg.style.pointerEvents = 'none'; }
        } else if (modo === 'raw') {
            raw.style.opacity = '1';
            if (svg) { svg.style.opacity = '0'; svg.style.pointerEvents = 'none'; }
        }
    }

    function vincularBotones() {
        const btnRaw = getCachedEl('btn-reveal-raw');
        let modoActual = 'front';

        if (btnRaw) {
            btnRaw.addEventListener('click', () => {
                if (modoActual === 'front') {
                    aplicarModoVisual('back'); modoActual = 'back'; triggerHaptic(12);
                } else if (modoActual === 'back') {
                    aplicarModoVisual('raw'); modoActual = 'raw'; triggerHaptic(10);
                } else {
                    aplicarModoVisual('front'); modoActual = 'front'; triggerHaptic(8);
                }
            });
        }
    }

    function inicializarBioRush() {
        vincularBotones();
        actualizarBioUI();
    }

    function cambiarBioVariant(variantKey) {
        currentBioVariant = variantKey;
        actualizarBioUI();
        triggerHaptic(10);
    }

    function actualizarBioUI() {
        const variantConfig = BIORUSH_CATALOG[currentBioVariant];
        const vContainer = getCachedEl('biorush-variants-container');
        
        const descEl = getCachedEl('biorush-description');
        const packImg = getCachedEl('biorush-pack-img');
        const packImgBack = getCachedEl('biorush-pack-img-back');
        const packImgRaw = getCachedEl('biorush-pack-img-raw');
        
        if (descEl && packImg && packImgBack) {
            descEl.classList.add('opacity-0');
            
            setTimeout(() => {
                descEl.textContent = variantConfig.desc;
                packImg.src = variantConfig.img;
                packImgBack.src = variantConfig.imgBack;
                if (packImgRaw) packImgRaw.src = variantConfig.imgRaw;
                
                const labelTitle = getCachedEl('laser-variant-title');
                if (labelTitle) labelTitle.textContent = variantConfig.label;
                
                descEl.classList.remove('opacity-0');
            }, 120);
        }

        // Sincronizar Telemetría Dinámica
        const tele = variantConfig.telemetry;
        const tCol = getCachedEl('tele-col');
        const tFru = getCachedEl('tele-fru');
        const tSec = getCachedEl('tele-sec');
        const tMol = getCachedEl('tele-mol');

        if (tCol) tCol.textContent = tele.COL;
        if (tFru) tFru.textContent = tele.FRU;
        if (tSec) tSec.textContent = tele.SEC;
        if (tMol) tMol.textContent = variantConfig.price;

// Renderizar Inyección de Navegación Compacta con Texto
        if (vContainer) {
            vContainer.innerHTML = `
                <button onclick="navegarVariante(1)" class="w-full h-full flex items-center justify-center rounded-sm border border-white/10 bg-white/5 hover:border-sky-500/50 hover:bg-sky-500/10 transition-all duration-300 text-[10px] tracking-[0.2em] font-bold text-white/50 hover:text-sky-400 uppercase">
                    Next
                </button>`;
        }
    }

    function navegarVariante(direccion) {
        const variantsKeys = Object.keys(BIORUSH_CATALOG);
        let currentIndex = variantsKeys.indexOf(currentBioVariant);
        currentIndex = (currentIndex + direccion + variantsKeys.length) % variantsKeys.length;
        cambiarBioVariant(variantsKeys[currentIndex]);
    }

    // =========================================================================
    // 4. MOTOR DE CONFIGURACIÓN TEMPORAL (LENGUAJE BIOCINÉTICO)
    // =========================================================================
    function updateZ() {
        let biokineticCoordinate = "";
        const now = new Date();
        const minutes = now.getMinutes();
        const seconds = now.getSeconds();

        let setsStage = 1;  
        let repsStage = 1;  
        let currentAction = 'P'; 

        if (seconds % 2 !== 0) {
            const progress1s = now.getMilliseconds() / 1000; 
            setsStage = Math.floor(progress1s * 12) + 1;
            repsStage = 13 - setsStage; 

            if (progress1s < 0.25) currentAction = 'P';
            else if (progress1s < 0.5) currentAction = 'U';
            else if (progress1s < 0.75) currentAction = 'L';
            else currentAction = 'S';
        } else {
            setsStage = Math.floor((minutes % 12) + 1);
            
            if (seconds < 30) {
                const subSlot = Math.floor((seconds % 30) / 7.5);
                currentAction = ["PL", "PU", "LU", "SU"][subSlot] || "PL";
                repsStage = Math.floor((seconds % 10) + 2);
            } else {
                const subSlot = Math.floor(((seconds - 30) % 30) / 7.5);
                currentAction = ["PUL", "PLS", "LUP", "ULS"][subSlot] || "ULS";
                repsStage = Math.floor(((seconds - 30) % 10) + 3);
            }
        }
        setsStage = Math.max(1, Math.min(12, setsStage));
        repsStage = Math.max(1, Math.min(12, repsStage));
        biokineticCoordinate = `${setsStage}${currentAction}${repsStage}`;

        const elDial = getCachedEl('z-dial');
        if (elDial) elDial.textContent = biokineticCoordinate;

        const subSetsSolar = getCachedEl('sub-sets-solar');
        const subRepsTension = getCachedEl('sub-reps-tension');
        if (subSetsSolar) subSetsSolar.textContent = `${(0.05 + (setsStage / 240)).toFixed(3)}`;
        if (subRepsTension) subRepsTension.textContent = `${(14.2 + (repsStage * 0.8)).toFixed(1)}`;
    }

    // =========================================================================
    // 5. TRADUCTOR DE ENUNCIADOS DE TELEMETRÍA
    // =========================================================================
    const TELEMETRY_MEANINGS = {
        'sub-sets-solar': "Frecuencia de resonancia",
        'sub-reps-tension': "Índice de cohesión molecular",
        'tele-col': "Temperatura de Colonizacion",
        'tele-fru': "Parámetros de maduración",
        'tele-sec': "Ciclo de deshidratación",
        'tele-mol': "Valor de adquisición"
    };

    function habilitarReveladoTelemetria() {
        const telemetryPuls = getCachedEl('panel-telemetry-puls');
        const textoOriginalPuls = "ONDAS BIOCINÉTICAS REGENERATIVAS";
        let ultimoElementoActivo = null;

        Object.keys(TELEMETRY_MEANINGS).forEach(id => {
            const el = getCachedEl(id);
            if (!el) return;

            el.addEventListener('click', () => {
                if (ultimoElementoActivo) {
                    ultimoElementoActivo.classList.remove('text-sky-400');
                    ultimoElementoActivo.classList.add('text-white/60');
                }
                
                el.classList.remove('text-white/60');
                el.classList.add('text-sky-400');
                ultimoElementoActivo = el;

                telemetryPuls.innerHTML = TELEMETRY_MEANINGS[id].toUpperCase();
                
                setTimeout(() => {
                    if (ultimoElementoActivo === el) {
                        telemetryPuls.innerHTML = textoOriginalPuls;
                        el.classList.remove('text-sky-400');
                        el.classList.add('text-white/60');
                        ultimoElementoActivo = null;
                    }
                }, 8000);
            });
        });
    }

    // =========================================================================
    // 6. PAYLOAD DE ADQUISICIÓN WHATSAPP
    // =========================================================================
    function adquirirNodo() {
        const variantConfig = BIORUSH_CATALOG[currentBioVariant];
        const currentCoord = getCachedEl('z-dial')?.textContent || "N/A";
        
        const freqValue = getCachedEl('sub-sets-solar')?.textContent || "0.00 Hz";
        const tensionValue = getCachedEl('sub-reps-tension')?.textContent || "0.0 N";
        
        const dialInterpretation = currentCoord.replace(/(\d+)([A-Z]+)(\d+)/, "$1 FASES, $3 NODOS - ESTADO $2");
        
        const mensaje = `⚡ *ORDEN - BIORUSH* ⚡\n\n` +
                        `• *Vector:* PULSOR ${currentBioVariant}\n` +
                        `• *Carga:* ${variantConfig.spec}\n` +
                        `• *ID:* \`${variantConfig.id}\`\n` +
                        `• *Precio:* ${variantConfig.price}\n\n` +
                        `--- *LENGUAJE BIOCINÉTICO* ---\n` +
                        `• *Matriz de Configuración:* \`${currentCoord}\`\n` +
                        `• *Análisis de Estado:* ${dialInterpretation}\n` +
                        `• *Resonancia:* \`${freqValue}\`\n` +
                        `• *Cohesión:* \`${tensionValue}\`\n\n` +
                        `Activar configuración actual.`;

        triggerHaptic([15, 40, 15]);
        window.open(`https://api.whatsapp.com/send?phone=${numeroCelular}&text=${encodeURIComponent(mensaje)}`, '_blank');
    }

    document.addEventListener('DOMContentLoaded', () => {
        inicializarBioRush();
        updateZ(); 
        setInterval(updateZ, 1000);
        habilitarReveladoTelemetria();
    });
</script>
</body>
</html>
