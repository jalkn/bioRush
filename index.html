<script>
    // =========================================================================
    // 1. CONFIGURACIÓN DE CATÁLOGOS COMERCIALES
    // =========================================================================
    const BIORUSH_CATALOG = {
        'PULSOR': {
            defaultVariant: 'FOCUS',
            variants: {
                'FOCUS': { 
                    label: 'PULSOR FOCUS', desc: 'Enfoque y claridad cognitiva',

                'ZEN': {

                    telemetry: { COL: '22°/85%', FRU: '16°/90%', SEC: '38°/14h', MOL: '97.5%' },
                    benefits: ['REDUCCIÓN CORTISOL', 'CALMA PROFUNDA', 'REGULACIÓN NERVIOSA', 'DESCANSO REPARADOR', 'EQUILIBRIO ', 'ADAPTACIÓN AL ESTRÉS', 'PAZ COGNITIVA', 'SUEÑO LÚCIDO', 'RELAJACIÓN MUSCULAR', 'CLARIDAD INTERNA']
                },
                'STAMINA': { 
                    label: 'PULSOR STAMINA', desc: 'Potencia celular óptima', 
                    spec: 'CORDYCEPS', price: '$70.000', id: 'PULS45S',
                    img: 'img/45caps.png', imgBack: 'img/45cordy.png', imgRaw: 'img/cordyRaw.png',
                    telemetry: { COL: '20°/80%', FRU: '15°/90%', SEC: '42°/10h', MOL: '99.0%' },
                    benefits: ['POTENCIA AERÓBICA', 'ENERGÍA CELULAR (ATP)', 'RESISTENCIA FÍSICA', 'OXIGENACIÓN SANGUÍNEA', 'RECUPERACIÓN RÁPIDA', 'VITALIDAD GENERAL', 'RENDIMIENTO ATLÉTICO', 'FUNCIÓN RESPIRATORIA', 'METABOLISMO ACTIVO', 'FATIGA (-)']
                },
                'CORE': { 
                    label: 'PULSOR CORE', desc: 'Respuesta inmune óptima', 
                    spec: 'TURKEY TAIL', price: '$70.000', id: 'PULS45C',
                    img: 'img/45caps.png', imgBack: 'img/45turkey.png', imgRaw: 'img/turkeyRaw.png',
                    telemetry: { COL: '23°/90%', FRU: '19°/95%', SEC: '40°/12h', MOL: '98.5%' },
                    benefits: ['RESPUESTA INMUNE', 'BIOMA INTESTINAL', 'DEFENSA CELULAR', 'ANTIOXIDANTE', 'SALUD DIGESTIVA', 'PROTECCIÓN SISTÉMICA', 'REDUCCIÓN INFLAMACIÓN', 'ESTABILIDAD INTERNA', 'SÍNTESIS NUTRITIVA', 'FORTALEZA INTEGRAL']
                }
            }
        }
    };

    let currentBioItem = 'PULSOR';
    let currentBioVariant = 'FOCUS';
    const numeroCelular = "573025333130";

    // ==========================================
    // 2. CACHÉ DE ELEMENTOS DE UI (OPTIMIZADO)
    // ==========================================
    const $ = (id) => document.getElementById(id);
    const cachedElements = {};
    
    function getCachedEl(id) {
        if (!cachedElements[id]) {
            cachedElements[id] = $(id);
        }
        return cachedElements[id];
    }

    const triggerHaptic = (ms) => { if (navigator.vibrate) navigator.vibrate(ms); };

    // ==========================================
    // 3. SISTEMA DE REVELADO (POINTER EVENTS)
    // ==========================================
// ==========================================
    // 3. MOTOR DE ESTADO VISUAL (Centralizado)
    // ==========================================
    function aplicarModoVisual(modo) {
        const front = getCachedEl('biorush-pack-img');
        const back = getCachedEl('biorush-pack-img-back');
        const raw = getCachedEl('biorush-pack-img-raw');
        const svg = getCachedEl('laser-vector-target');

        // Reset general
        [front, back, raw].forEach(el => { if(el) el.style.opacity = '0'; });
        
        // Aplicar estado
        if (modo === 'front') {
            front.style.opacity = '1';
            front.style.zIndex = '10';
            back.style.zIndex = '0';
            if (svg) { svg.style.opacity = '1'; svg.style.pointerEvents = 'auto'; }
        } else if (modo === 'back') {
            back.style.opacity = '1';
            back.style.zIndex = '10';
            front.style.zIndex = '0';
            if (svg) { svg.style.opacity = '0'; svg.style.pointerEvents = 'none'; }
        } else if (modo === 'raw') {
            raw.style.opacity = '1';
            if (svg) { svg.style.opacity = '0'; svg.style.pointerEvents = 'none'; }
        }
    }

    function vincularBotones() {
        const btnBio = getCachedEl('btn-reveal-bio');
        const btnRaw = getCachedEl('btn-reveal-raw');
        
        // Estado para gestionar el modo actual y permitir el "cierre" al presionar de nuevo
        let modoActual = 'front';

        const alternarModo = (modo, haptic) => {
            if (modoActual === modo) {
                aplicarModoVisual('front');
                modoActual = 'front';
            } else {
                aplicarModoVisual(modo);
                modoActual = modo;
                triggerHaptic(haptic);
            }
        };

        // Eventos de clic simple
        btnBio.addEventListener('click', () => alternarModo('back', 12));
        btnRaw.addEventListener('click', () => alternarModo('raw', 10));
    }

    // ==========================================
    // 4. CONTROLADORES DE INTERFAZ DE USUARIO
    // ==========================================
    function inicializarBioRush() {
        const menuContainer = getCachedEl('biorush-items-menu');
        if (menuContainer) {
            menuContainer.innerHTML = Object.keys(BIORUSH_CATALOG).map(item => `
                <span id="menu-bio-${item}" onclick="cambiarBioItem('${item}')" class="cursor-pointer tracking-[0.15em] transition-all duration-300 h-5 leading-none font-bold">
                    ${item}
                </span>
            `).join('');
        }
        
        vincularBotones();
        actualizarBioUI();
    }

    function cambiarBioItem(itemKey) {
        currentBioItem = itemKey;
        currentBioVariant = BIORUSH_CATALOG[itemKey].defaultVariant;
        actualizarBioUI();
        triggerHaptic(15);
    }

    function cambiarBioVariant(variantKey) {
        currentBioVariant = variantKey;
        actualizarBioUI();
        triggerHaptic(10);
    }

    function actualizarBioUI() {
        const itemConfig = BIORUSH_CATALOG[currentBioItem];
        const variantConfig = itemConfig.variants[currentBioVariant];
        
        const descEl = getCachedEl('biorush-description');
        const packImg = getCachedEl('biorush-pack-img');
        const packImgBack = getCachedEl('biorush-pack-img-back');
        
        if (descEl && packImg && packImgBack) {
            descEl.classList.add('opacity-0');
            
            setTimeout(() => {
                descEl.textContent = variantConfig.desc;
                packImg.src = variantConfig.img;
                packImgBack.src = variantConfig.imgBack;
                getCachedEl('biorush-pack-img-raw').src = variantConfig.imgRaw;
                
                const labelTitle = getCachedEl('laser-variant-title');
                if (labelTitle) labelTitle.textContent = variantConfig.label;
                getCachedEl('biorush-spec').textContent = variantConfig.spec;
                getCachedEl('biorush-price').textContent = variantConfig.price;
                
                descEl.classList.remove('opacity-0');
            }, 120);
        }

        // Actualizar estados visuales de menú
        Object.keys(BIORUSH_CATALOG).forEach(item => {
            const el = getCachedEl(`menu-bio-${item}`);
            if (el) el.className = (item === currentBioItem) ? "cursor-pointer tracking-[0.15em] transition-all duration-300 h-5 leading-none font-bold text-white scale-105 border-b border-sky-400 pb-0.5" : "cursor-pointer tracking-[0.15em] transition-all duration-300 h-5 leading-none text-white/80 hover:text-white/80";
        });

        // Actualizar variantes
        const vContainer = getCachedEl('biorush-variants-container');
        const tele = variantConfig.telemetry;
        getCachedEl('tele-col').textContent = tele.COL;
        getCachedEl('tele-fru').textContent = tele.FRU;
        getCachedEl('tele-sec').textContent = tele.SEC;
        getCachedEl('tele-mol').textContent = tele.MOL;
        if (vContainer) {
            vContainer.innerHTML = Object.keys(itemConfig.variants).map(vKey => `
                <span onclick="cambiarBioVariant('${vKey}')" class="cursor-pointer transition-all duration-300 px-3 py-1 bg-black/40 backdrop-blur-md rounded-sm border ${vKey === currentBioVariant ? 'border-white text-white font-black shadow-[0_0_12px_rgba(255,255,255,0.1)]' : 'border-white/5 text-white/80 hover:border-white/20 hover:text-white/80'}">
                    ${vKey}
                </span>`).join('');
        }

    }

    // =========================================================================
    // 5. MOTOR DE TELEMETRÍA (PROTOCOLO PULS)
    // =========================================================================
    function calculateSphereIndex() {
        const now = new Date();
        const epoch = new Date('2012-12-21T00:00:00Z');
        const daysSinceEpoch = Math.floor((now - epoch) / 86400000);
        
        // Calculamos qué parte del día es (0 a 3, representando los 4 bloques de 6 horas)
        const currentHour = now.getHours();
        const sphereQuadrant = Math.floor(currentHour / 6);
        
        // El índice total será (Días * 4) + el cuadrante actual
        const totalSpheres = (daysSinceEpoch * 4) + sphereQuadrant;
        
        return `${String(totalSpheres).padStart(4, '0')}.◯`;
    }

    function updateZ() {
        let biokineticCoordinate = "";
        const now = new Date();
        const hours = now.getHours(); 
        const minutes = now.getMinutes();
        const seconds = now.getSeconds();

        const currentSphereIdx = calculateSphereIndex();
        
        const elIdx = getCachedEl('telemetry-sphere-idx');
        if (elIdx && elIdx.textContent !== currentSphereIdx) elIdx.textContent = currentSphereIdx;

        let setsStage = 1;  
        let repsStage = 1;  
        let currentAction = 'P'; 

        if (seconds % 2 !== 0) {
            const progress1s = now.getMilliseconds() / 1000; 
            setsStage = Math.floor(progress1s * 12) + 1;
            repsStage = 13 - setsStage; 

            if (progress1s < 0.25) currentAction = 'P';
            else if (progress1s < 0.5) currentAction = 'U';
            else if (progress1s < 0.75) currentAction = 'L';
            else currentAction = 'S';
        } else {
            setsStage = Math.floor((minutes % 12) + 1);
            
            if (seconds < 30) {
                const subSlot = Math.floor((seconds % 30) / 7.5);
                currentAction = ["PL", "PU", "LU", "SU"][subSlot] || "PL";
                repsStage = Math.floor((seconds % 10) + 2);
            } else {
                const subSlot = Math.floor(((seconds - 30) % 30) / 7.5);
                currentAction = ["PUL", "PLS", "LUP", "ULS"][subSlot] || "ULS";
                repsStage = Math.floor(((seconds - 30) % 10) + 3);
            }
        }
        setsStage = Math.max(1, Math.min(12, setsStage));
        repsStage = Math.max(1, Math.min(12, repsStage));
        biokineticCoordinate = `${setsStage}${currentAction}${repsStage}`;

        const elDial = getCachedEl('z-dial');
        if (elDial) elDial.textContent = biokineticCoordinate;
                
        // Dentro de la función updateZ(), reemplaza la línea de activeNodeText por esta:
        const totalSecondsSinceMidnight = (hours * 3600) + (minutes * 60) + seconds;
        const activeNodeText = `⨀.${String(totalSecondsSinceMidnight + 1).padStart(4, '0')}`;
        const elActiveNode = getCachedEl('telemetry-active-node');
        if (elActiveNode) elActiveNode.textContent = activeNodeText;

        const subSetsSolar = getCachedEl('sub-sets-solar');
        const subRepsTension = getCachedEl('sub-reps-tension');
        if (subSetsSolar) subSetsSolar.textContent = `${(0.05 + (setsStage / 240)).toFixed(3)} Hz`;
        if (subRepsTension) subRepsTension.textContent = `${(14.2 + (repsStage * 0.8)).toFixed(1)} N`;
    }

    const TELEMETRY_MEANINGS = {
        'telemetry-sphere-idx': "Registro de lote molecular", 
        'telemetry-active-node': "Nivel de saturación técnica",
        'sub-sets-solar': "Frecuencia de resonancia estable",
        'sub-reps-tension': "Índice de cohesión molecular",
        'tele-col': "Condiciones térmicas de semilla",
        'tele-fru': "Parámetros de maduración del fruto",
        'tele-sec': "Ciclo de deshidratación de harina",
        'tele-mol': "Índice de pureza molecular"
        
    };

    function habilitarReveladoTelemetria() {
        const feedbackPanel = getCachedEl('telemetry-feedback-panel');
        const logoImg = getCachedEl('panel-logo');
        const titleText = getCachedEl('panel-text-title');
        const telemetryData = getCachedEl('panel-telemetry-data');

        Object.keys(TELEMETRY_MEANINGS).forEach(id => {
            const el = getCachedEl(id);
            if (!el) return;

            el.addEventListener('click', () => {
                // 1. Ocultar logo, mostrar Título Protocolo y Telemetría
                if (logoImg) logoImg.style.display = 'none';
                if (titleText) titleText.classList.remove('hidden');
                
                telemetryData.textContent = TELEMETRY_MEANINGS[id].toLowerCase(); 
                
                setTimeout(() => {
                    // 2. Restaurar logo, ocultar Título y limpiar telemetría
                    if (logoImg) logoImg.style.display = 'block';
                    if (titleText) titleText.classList.add('hidden');
                    telemetryData.textContent = ''; 
                }, 8000);
            });
        });
    }

    // =========================================================================
    // 6. CAPTURA DE TELEMETRÍA DE COMPRA (GENERACIÓN DE PAYLOAD)
    // =========================================================================
    function adquirirNodo() {
        const variantConfig = BIORUSH_CATALOG[currentBioItem].variants[currentBioVariant];
        const currentCoord = getCachedEl('z-dial')?.textContent || "N/A";
        const currentSphere = getCachedEl('telemetry-sphere-idx')?.textContent || "N/A";
        const currentNode = getCachedEl('telemetry-active-node')?.textContent || "N/A";
        
        // Captura de valores calculados en el DOM
        const freqValue = getCachedEl('sub-sets-solar')?.textContent || "0.00 Hz";
        const tensionValue = getCachedEl('sub-reps-tension')?.textContent || "0.0 N";
        
        // Traducción técnica bajo Sinergia Molecular Óptima
        const dialInterpretation = currentCoord.replace(/(\d+)([A-Z]+)(\d+)/, "$1 FASES, $3 NODOS - ESTADO $2");
        
        const mensaje = `⚡ *ORDEN - BIORUSH* ⚡\n\n` +
                        `• *Vector:* ${currentBioItem} ${currentBioVariant}\n` +
                        `• *Carga:* ${variantConfig.spec}\n` +
                        `• *ID:* \`${variantConfig.id}\`\n` +
                        `• *Precio:* ${variantConfig.price}\n\n` +
                        `--- *PROTOCOLO P.U.L.S.* ---\n` +
                        `• *Matriz de Configuración:* \`${currentCoord}\`\n` +
                        `• *Análisis de Estado:* ${dialInterpretation}\n` +
                        `• *Lote:* \`${currentSphere}\`\n` +
                        `• *Saturación:* \`${currentNode}\`\n` +
                        `• *Resonancia:* \`${freqValue}\`\n` +
                        `• *Cohesión:* \`${tensionValue}\`\n\n` +
                        `Activar configuración actual.`;

        triggerHaptic([15, 40, 15]);
        window.open(`https://api.whatsapp.com/send?phone=${numeroCelular}&text=${encodeURIComponent(mensaje)}`, '_blank');
    }

    // Inicialización coordinada del Ciclo de Vida del DOM
    document.addEventListener('DOMContentLoaded', () => {
        inicializarBioRush();
        updateZ(); 
        setInterval(updateZ, 1000);
        habilitarReveladoTelemetria();
    });
</script>
</body>
</html>
