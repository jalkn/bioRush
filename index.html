<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link class="icon" type="image/png" href="img/favicon.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BIORUSH</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Plus+Jakarta+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = { 
            theme: { 
                extend: { 
                    screens: { 'xs': '400px' },
                    colors: { 'jako-black': '#0a0705' },
                    fontFamily: { 
                        'sans': ['Orbitron', 'sans-serif'],
                        'mono': ['Orbitron', 'monospace'],
                        'body': ['Plus Jakarta Sans', 'sans-serif']
                    }
                }
            }
        }
    </script>
    <style>
body { 
            font-family: 'Orbitron', sans-serif; 
            background-color: #020617; 
            color: #f8fafc; 
            overscroll-behavior: none;
        } 
        #page-bg-overlay {
            position: fixed; 
            inset: 0; 
            z-index: -1;
            background: radial-gradient(circle at 50% 50%, #0f172a 0%, #051144 100%);
        }
        
        .viewport-scroll-container {
            flex: 1;
            width: 100%;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }
        .viewport-scroll-container::-webkit-scrollbar { display: none; }

        /* --- ARQUITECTURA UNIFICADA DE VIDRIO ESMERILADO DE ANCHO COMPLETO --- */
        .glass-panel {
            width: 100%;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.02) 0%, rgba(255, 255, 255, 0.005) 100%);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            box-shadow: 
                inset 0 1px 1px rgba(255, 255, 255, 0.08), 
                inset 0 -1px 0px rgba(0, 0, 0, 0.4),
                0 12px 40px rgba(0, 0, 0, 0.7);
        }

        /* --- EFECTO GRABADO LÁSER / ESMERILADO APAGADO (REFLEXIÓN DIFUSA) --- */
        #telemetry-scroll-viewport > div {
            opacity: 0.25;
            transform: scale(0.96);
            filter: blur(0.3px);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        #telemetry-scroll-viewport > div .tele-value {
            color: rgba(200, 205, 215, 0.4);
            text-shadow: 0.5px 0.5px 1px rgba(255, 255, 255, 0.05);
            transition: all 0.4s ease;
        }

        /* --- GRABADO ILUMINADO POR LED COAXIAL (ACTIVO) --- */
        #telemetry-scroll-viewport > div.node-central-active {
            opacity: 1;
            transform: scale(1.05);
            filter: blur(0);
        }
        #telemetry-scroll-viewport > div.node-central-active .tele-value {
            color: #ffffff !important;
            text-shadow: 
                0 0 3px rgba(255, 255, 255, 0.9), 
                0 0 10px rgba(255, 255, 255, 0.5), 
                0 0 20px rgba(255, 255, 255, 0.2);
        }
        
        /* Lente Óptica Trasera de Iluminación */
        .led-lens-bg {
            position: absolute;
            left: 50%;
            top: 35%;
            transform: translate(-50%, -50%);
            width: 120px;
            height: 35px;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.07) 0%, rgba(255, 255, 255, 0) 75%);
            border-radius: 50%;
            filter: blur(6px);
            pointer-events: none;
            z-index: 0;
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .led-lens-bg.lens-active {
            background: radial-gradient(circle, rgba(255, 255, 255, 0.18) 0%, rgba(255, 255, 255, 0) 70%);
            width: 160px;
            height: 45px;
            filter: blur(4px);
        }

        /* --- BOTONES HUD: STENCIL ESMERILADO CON RETROILUMINACIÓN LED --- */
        .hud-btn-stencil {
            position: relative;
            background: rgba(255, 255, 255, 0.01);
            border: 1px solid rgba(255, 255, 255, 0.06);
            color: rgba(255, 255, 255, 0.35); /* Tono esmerilado apagado */
            text-shadow: 0.5px 0.5px 0px rgba(0, 0, 0, 0.5);
            transition: all 0.3s cubic-bezier(0.25, 1, 0.5, 1);
            overflow: hidden;
        }
        .hud-btn-stencil::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at 50% 50%, rgba(255, 255, 255, 0.15) 0%, rgba(255, 255, 255, 0) 70%);
            opacity: 0;
            transform: scale(0.6);
            transition: all 0.4s ease;
            z-index: 0;
            pointer-events: none;
        }
        .hud-btn-stencil:hover {
            border-color: rgba(255, 255, 255, 0.25);
            color: #ffffff;
            text-shadow: 0 0 4px rgba(255, 255, 255, 0.6);
            background: rgba(255, 255, 255, 0.03);
        }
        .hud-btn-stencil:hover::before {
            opacity: 1;
            transform: scale(1.2);
        }

        .glass-axis-marker {
            font-family: 'Orbitron', monospace;
            font-size: 7px;
            font-weight: 900;
            color: rgba(255, 255, 255, 0.15);
            letter-spacing: -1px;
            pointer-events: none;
            user-select: none;
            z-index: 20;
        }

    </style>
</head>
<body class="antialiased selection:bg-white selection:text-black overflow-x-hidden text-white min-h-screen flex flex-col justify-between">

    <div id="page-bg-overlay"></div>
    <div class="fixed inset-0 bg-gradient-to-b from-black/50 via-transparent to-black/60 z-0 pointer-events-none"></div>

    <main id="main-vault" class="w-screen h-screen flex flex-col relative overflow-hidden justify-between">
        
<header class="h-[75px] shrink-0 glass-panel border-b border-white/10 z-50 flex flex-col items-center justify-center px-6">
            <div class="flex items-center justify-center gap-3 w-full"> 
                <img src="img/lift.png" alt="Back" class="h-5 w-auto object-contain opacity-80" />
                <span class="text-[11px] tracking-[0.3em] font-black text-white/80 uppercase text-shadow-[0.5px_0.5px_1px_rgba(255,255,255,0.05)]">BIORUSH</span>
            </div>
        </header>

        <div class="viewport-scroll-container flex flex-col items-center py-6 px-4 gap-y-4">
            <div id="biorush-pack-container" class="relative w-full max-w-[180px] xs:max-w-[200px] sm:max-w-[230px] md:max-w-[260px] aspect-[13/15] shrink-0 drop-shadow-[0_35px_55px_rgba(0,0,0,0.95)] my-auto">
                <div class="w-full h-full relative overflow-hidden bg-transparent">
                    <img id="biorush-pack-img-back" src="img/45mane.png" alt="BioRush Pack Back" class="img-glow-transition absolute inset-0 w-full h-full object-contain opacity-0 pointer-events-none z-0" />
                    <img id="biorush-pack-img" src="img/45caps.png" alt="BioRush Pack Front" class="img-glow-transition absolute inset-0 w-full h-full object-contain pointer-events-auto z-10" />
                    <img id="biorush-pack-img-raw" src="" alt="Raw Content" class="img-glow-transition absolute inset-0 w-full h-full object-contain opacity-0 pointer-events-none z-[5]" />
                    
                    <div class="absolute inset-0 flex items-center justify-center p-2 z-20 pointer-events-none">
                        <svg id="laser-vector-target" viewBox="0 0 400 400" class="w-full h-full fill-none stroke-white/20 stroke-[1.2] transition-all duration-500 origin-center transform scale-[1.25]">
                            <defs>
                                <path id="textPath-top" d="M 65,200 A 135,135 0 0,1 335,200" />
                                <path id="textPath-bottom" d="M 65,200 A 135,135 0 0,0 335,200" />
                            </defs>
                            
                            <text class="fill-white font-black text-[10px] tracking-[0.3em] uppercase transition-all duration-500">
                                <textPath id="laser-variant-title" href="#textPath-top" startOffset="50%" text-anchor="middle">PULSOR FOCUS</textPath>
                            </text>
                            
                            <g class="origin-center transform scale-[1.05]">
                                <path d="M 110,120 L 290,120 L 110,280 L 290,280 Z" class="opacity-15 stroke-[1.0]" />
                                <path d="M 110,120 Q 200,150 290,120" class="opacity-15 stroke-[1.0]" />
                                <path d="M 110,280 Q 200,250 290,280" stroke-dasharray="2 2" class="opacity-15 stroke-[1.0]" />
                                
                                <text x="200" y="165" text-anchor="middle" class="fill-white/20 text-[7px] tracking-[0.3em] font-bold uppercase"></text>
                                <text id="z-dial" x="200" y="210" text-anchor="middle" class="fill-white font-black text-[36px] tracking-[0.4em] font-sans">8UST11</text>
                                <text x="200" y="245" text-anchor="middle" class="fill-white/20 text-[6px] tracking-[0.4em] font-mono"></text>
                            </g>
                            
                            <text class="fill-white/40 font-black text-[10px] tracking-[0.25em] uppercase transition-all duration-500">
                                <textPath id="biorush-description" href="#textPath-bottom" startOffset="50%" text-anchor="middle">Enfoque y claridad cognitiva</textPath>
                            </text>
                        </svg>
                    </div>
                </div>
            </div>
        </div>

<footer class="w-full shrink-0 flex flex-col items-center bg-gradient-to-t from-black via-black/90 to-transparent pt-4 pb-3 z-50 border-t border-white/5">
            
<!-- ESPECIFICACIÓN: CENTRALIZADA EN LA PARTE SUPERIOR DEL PANEL DE VIDRIO CON EFECTO GRABADO -->
            <div class="w-full max-w-sm mx-auto px-4 mb-1 flex justify-center">
                <span id="biorush-spec" class="transition-all duration-300 text-[7px] tracking-[0.3em] font-mono uppercase tele-value">--</span>
            </div>

            <!-- PANEL DE VIDRIO INTEGRAL ANCHO COMPLETO -->
            <div class="w-full pb-3 pt-2 px-4 flex flex-col items-center overflow-hidden relative glass-panel border-t border-b border-white/10 mb-4">
                
                <div id="telemetry-led-lens" class="led-lens-bg"></div>

                <div class="absolute left-4 top-[38%] -translate-y-1/2 glass-axis-marker text-left select-none">┠─</div>
                <div class="absolute right-4 top-[38%] -translate-y-1/2 glass-axis-marker text-right select-none">─┨</div>

                <div id="telemetry-scroll-viewport" class="flex overflow-x-auto w-full pt-1 mb-2 scroll-smooth snap-x snap-mandatory [scrollbar-width:none] [&::-webkit-scrollbar]:hidden z-10 border-b border-white/[0.02]">
                    <div class="flex flex-col items-center w-1/3 min-w-[33.333%] shrink-0 snap-start">
                        <span id="sub-sets-solar" class="font-mono tracking-[0.2em] text-[11px] cursor-pointer tele-value">0.00</span>
                        <span class="text-[5.5px] tracking-[0.25em] text-white/20 uppercase font-black mt-0.5 font-mono">Hz</span>
                    </div>
                    <div class="flex flex-col items-center w-1/3 min-w-[33.333%] shrink-0 snap-start">
                        <span id="sub-reps-tension" class="font-mono tracking-[0.2em] text-[11px] cursor-pointer tele-value">0.0</span>
                        <span class="text-[5.5px] tracking-[0.25em] text-white/20 uppercase font-black mt-0.5 font-mono">Tensión</span>
                    </div>
                    <div class="flex flex-col items-center w-1/3 min-w-[33.333%] shrink-0 snap-start">
                        <span id="tele-col" class="font-mono tracking-[0.1em] text-[10px] cursor-pointer tele-value">--</span>
                        <span class="text-[5.5px] tracking-[0.25em] text-white/20 uppercase font-black mt-0.5 font-mono">Siembra</span>
                    </div>
                    <div class="flex flex-col items-center w-1/3 min-w-[33.333%] shrink-0 snap-start">
                        <span id="tele-fru" class="font-mono tracking-[0.1em] text-[10px] cursor-pointer tele-value">--</span>
                        <span class="text-[5.5px] tracking-[0.25em] text-white/20 uppercase font-black mt-0.5 font-mono">Cosecha</span>
                    </div>
                    <div class="flex flex-col items-center w-1/3 min-w-[33.333%] shrink-0 snap-start">
                        <span id="tele-sec" class="font-mono tracking-[0.1em] text-[10px] cursor-pointer tele-value">--</span>
                        <span class="text-[5.5px] tracking-[0.25em] text-white/20 uppercase font-black mt-0.5 font-mono">Secado</span>
                    </div>
                    <div class="flex flex-col items-center w-1/3 min-w-[33.333%] shrink-0 snap-start">
                        <span id="tele-mol" class="font-mono tracking-[0.1em] text-[10px] cursor-pointer tele-value">--</span>
                        <span class="text-[5.5px] tracking-[0.25em] text-white/20 uppercase font-black mt-0.5 font-mono">Precio</span>
                    </div>
                </div>

                <div class="flex flex-col items-center justify-center w-full z-10 min-h-[14px] mb-2.5">
                    <span id="panel-telemetry-puls" class="text-[7.5px] text-center tracking-[0.45em] font-bold text-white/40 uppercase transition-all duration-300 font-mono"></span>
                </div>

                <!-- SUB-BARRA INFERIOR CON LOS OTROS DOS ELEMENTOS CONSERVADOS -->
                <div class="flex items-center justify-center gap-3 text-white/20 text-[7px] tracking-[0.3em] font-mono select-none w-full uppercase border-t border-white/5 pt-2 z-10 bg-black/[0.05]">
                    <span id="biorush-cant" class="text-white/20 transition-all duration-300">--</span>
                    <span class="opacity-10 text-[5px]">|</span>
                    <span id="biorush-price" class="text-white/50 font-black transition-all duration-300">--</span>
                </div>
            </div>

            <!-- FILA DE BOTONES HUD CON ESTILO STENCIL -->
            <div class="grid grid-cols-4 items-center gap-2 w-full max-w-[340px] mx-auto px-4 mb-3.5">
                <button id="biorush-variants-container" onclick="navegarVariante(1)" class="hud-btn-stencil w-full h-6 flex items-center justify-center rounded-sm text-[9px] tracking-[0.2em] font-bold uppercase leading-none">
                    Next
                </button>
                <button onclick="desplazarTelemetria()" class="hud-btn-stencil w-full h-6 flex items-center justify-center rounded-sm text-[9px] tracking-[0.2em] font-bold uppercase leading-none">
                    Info
                </button>
                <button id="btn-reveal-raw" class="hud-btn-stencil w-full h-6 flex items-center justify-center rounded-sm text-[9px] tracking-[0.2em] font-bold uppercase leading-none">
                    Ver
                </button>
                <button onclick="adquirirNodo()" class="hud-btn-stencil w-full h-6 flex items-center justify-center rounded-sm text-[9px] tracking-[0.2em] font-black uppercase leading-none bg-white/[0.03] border-white/20 !color-white/80">
                    ACTIVAR
                </button>
            </div>

            <!-- CRÉDITOS CON ENLACE REDIRECCIONADO A JAKO.WORLD -->
            <div class="w-full flex justify-center items-center py-1">
                <a href="https://jako.world" target="_blank" class="text-[6px] tracking-[0.6em] font-bold text-white/20 hover:text-white/40 transition-colors duration-300 uppercase">
                    POWERED BY JAKO.ART
                </a>
            </div>
        </footer>
    </main>

<script>
    // =========================================================================
    // 1. CONFIGURACIÓN DE VARIANTES LINEALES EXCLUSIVAS BIORUSH
    // =========================================================================
    const BIORUSH_CATALOG = {
        'FOCUS': { 
            label: 'PULSOR FOCUS', desc: 'Enfoque y claridad cognitiva', 
            spec: 'LION’S MANE', cant: '45X500MGRS', price: '$70MIL', id: 'PULS45F',
            img: 'img/45caps.png', imgBack: 'img/45mane.png', imgRaw: 'img/maneRaw.png',
            telemetry: { COL: '24°', FRU: '18°', SEC: '40°' },
            benefits: ['NEUROGÉNESIS', 'CLARIDAD COGNITIVA', 'MEMORIA FLUIDA', 'OPTIMIZACIÓN SINÁPTICA', 'ENFOQUE PROFUNDO']
        },
        'ZEN': { 
            label: 'PULSOR ZEN', desc: 'Silencio mental óptimo', 
            spec: 'REISHI', cant: '45X500MGRS', price: '$70MIL', id: 'PULS45Z',
            img: 'img/45caps.png', imgBack: 'img/45reishi.png', imgRaw: 'img/reishiRaw.png',
            telemetry: { COL: '22°', FRU: '16°', SEC: '38°' },
            benefits: ['REDUCCIÓN CORTISOL', 'CALMA PROFUNDA', 'REGULACIÓN NERVIOSA', 'DESCANSO REPARADOR', 'ADAPTACIÓN AL ESTRÉS']
        },
        'STAMINA': { 
            label: 'PULSOR STAMINA', desc: 'Potencia celular óptima', 
            spec: 'CORDYCEPS', cant: '45X500MGRS', price: '$70MIL', id: 'PULS45S',
            img: 'img/45caps.png', imgBack: 'img/45cordy.png', imgRaw: 'img/cordyRaw.png',
            telemetry: { COL: '20°', FRU: '15°', SEC: '42°' },
            benefits: ['POTENCIA AERÓBICA', 'ENERGÍA CELULAR (ATP)', 'RESISTENCIA FÍSICA', 'OXIGENACIÓN SANGUÍNEA', 'RECUPERACIÓN RÁPIDA']
        },
        'CORE': { 
            label: 'PULSOR CORE', desc: 'Respuesta inmune óptima', 
            spec: 'TURKEY TAIL', cant: '45X500MGRS', price: '$70MIL', id: 'PULS45C',
            img: 'img/45caps.png', imgBack: 'img/45turkey.png', imgRaw: 'img/turkeyRaw.png',
            telemetry: { COL: '23°', FRU: '19°', SEC: '40°' },
            benefits: ['RESPUESTA INMUNE', 'BIOMA INTESTINAL', 'DEFENSA CELULAR', 'ANTIOXIDANTE', 'PROTECCIÓN SISTÉMICA']
        }
    };

    let currentBioVariant = 'FOCUS';
    const numeroCelular = "573025333130";

    // ==========================================
    // 2. CACHÉ DE ELEMENTOS DE UI
    // ==========================================
    const $ = (id) => document.getElementById(id);
    const cachedElements = {};
    
    function getCachedEl(id) {
        if (!cachedElements[id]) {
            cachedElements[id] = $(id);
        }
        return cachedElements[id];
    }

    const triggerHaptic = (ms) => { if (navigator.vibrate) navigator.vibrate(ms); };

    // ==========================================
    // 3. MOTOR DE ESTADO VISUAL (FRONT -> BACK -> RAW)
    // ==========================================
    function aplicarModoVisual(modo) {
        const front = getCachedEl('biorush-pack-img');
        const back = getCachedEl('biorush-pack-img-back');
        const raw = getCachedEl('biorush-pack-img-raw');
        const svg = getCachedEl('laser-vector-target');

        [front, back, raw].forEach(el => { if(el) el.style.opacity = '0'; });
        
        if (modo === 'front') {
            front.style.opacity = '1'; front.style.zIndex = '10'; back.style.zIndex = '0';
            if (svg) { svg.style.opacity = '1'; svg.style.pointerEvents = 'auto'; }
        } else if (modo === 'back') {
            back.style.opacity = '1'; back.style.zIndex = '10'; front.style.zIndex = '0';
            if (svg) { svg.style.opacity = '0'; svg.style.pointerEvents = 'none'; }
        } else if (modo === 'raw') {
            raw.style.opacity = '1';
            if (svg) { svg.style.opacity = '0'; svg.style.pointerEvents = 'none'; }
        }
    }

    function vincularBotones() {
        const btnRaw = getCachedEl('btn-reveal-raw');
        let modoActual = 'front';

        if (btnRaw) {
            btnRaw.addEventListener('click', () => {
                if (modoActual === 'front') {
                    aplicarModoVisual('back'); modoActual = 'back'; triggerHaptic(12);
                } else if (modoActual === 'back') {
                    aplicarModoVisual('raw'); modoActual = 'raw'; triggerHaptic(10);
                } else {
                    aplicarModoVisual('front'); modoActual = 'front'; triggerHaptic(8);
                }
            });
        }
    }

    function inicializarBioRush() {
        vincularBotones();
        actualizarBioUI();
    }

    function cambiarBioVariant(variantKey) {
        currentBioVariant = variantKey;
        actualizarBioUI();
        triggerHaptic(10);
    }

    function actualizarBioUI() {
        const variantConfig = BIORUSH_CATALOG[currentBioVariant];
        const vContainer = getCachedEl('biorush-variants-container');
        
        const descEl = getCachedEl('biorush-description');
        const packImg = getCachedEl('biorush-pack-img');
        const packImgBack = getCachedEl('biorush-pack-img-back');
        const packImgRaw = getCachedEl('biorush-pack-img-raw');
        
        if (descEl && packImg && packImgBack) {
            descEl.classList.add('opacity-0');
            
            setTimeout(() => {
                descEl.textContent = variantConfig.desc;
                packImg.src = variantConfig.img;
                packImgBack.src = variantConfig.imgBack;
                if (packImgRaw) packImgRaw.src = variantConfig.imgRaw;
                
                const labelTitle = getCachedEl('laser-variant-title');
                if (labelTitle) labelTitle.textContent = variantConfig.label;
                
                descEl.classList.remove('opacity-0');
            }, 120);
        }

        // Sincronizar Telemetría Dinámica de Canales
        const tele = variantConfig.telemetry;
        const tCol = getCachedEl('tele-col');
        const tFru = getCachedEl('tele-fru');
        const tSec = getCachedEl('tele-sec');
        const tMol = getCachedEl('tele-mol');

        if (tCol) tCol.textContent = tele.COL;
        if (tFru) tFru.textContent = tele.FRU;
        if (tSec) tSec.textContent = tele.SEC;
        if (tMol) tMol.textContent = variantConfig.price;

        // --- ENLACE DIRECTO A LA SUB-BARRA INFERIOR DEL CRISTAL ---
        const hudSpec = getCachedEl('biorush-spec');
        const hudCant = getCachedEl('biorush-cant');
        const hudPrice = getCachedEl('biorush-price');

        if (hudSpec) hudSpec.textContent = variantConfig.spec;
        if (hudCant) hudCant.textContent = variantConfig.cant;
        if (hudPrice) hudPrice.textContent = variantConfig.price;

        // Mantener texto base en el botón disparador
        if (vContainer) {
            vContainer.textContent = 'Next';
        }
    }
    function navegarVariante(direccion) {
        const variantsKeys = Object.keys(BIORUSH_CATALOG);
        let currentIndex = variantsKeys.indexOf(currentBioVariant);
        currentIndex = (currentIndex + direccion + variantsKeys.length) % variantsKeys.length;
        cambiarBioVariant(variantsKeys[currentIndex]);
    }

    // =========================================================================
    // 4. MOTOR DE CONFIGURACIÓN TEMPORAL (LENGUAJE BIOCINÉTICO)
    // =========================================================================
    function updateZ() {
        let biokineticCoordinate = "";
        const now = new Date();
        const minutes = now.getMinutes();
        const seconds = now.getSeconds();

        let setsStage = 1;  
        let repsStage = 1;  
        let currentAction = 'P'; 

        if (seconds % 2 !== 0) {
            const progress1s = now.getMilliseconds() / 1000; 
            setsStage = Math.floor(progress1s * 12) + 1;
            repsStage = 13 - setsStage; 

            if (progress1s < 0.25) currentAction = 'P';
            else if (progress1s < 0.5) currentAction = 'U';
            else if (progress1s < 0.75) currentAction = 'L';
            else currentAction = 'S';
        } else {
            setsStage = Math.floor((minutes % 12) + 1);
            
            if (seconds < 30) {
                const subSlot = Math.floor((seconds % 30) / 7.5);
                currentAction = ["PL", "PU", "LU", "SU"][subSlot] || "PL";
                repsStage = Math.floor((seconds % 10) + 2);
            } else {
                const subSlot = Math.floor(((seconds - 30) % 30) / 7.5);
                currentAction = ["PUL", "PLS", "LUP", "ULS"][subSlot] || "ULS";
                repsStage = Math.floor(((seconds - 30) % 10) + 3);
            }
        }
        setsStage = Math.max(1, Math.min(12, setsStage));
        repsStage = Math.max(1, Math.min(12, repsStage));
        biokineticCoordinate = `${setsStage}${currentAction}${repsStage}`;

        const elDial = getCachedEl('z-dial');
        if (elDial) elDial.textContent = biokineticCoordinate;

        const subSetsSolar = getCachedEl('sub-sets-solar');
        const subRepsTension = getCachedEl('sub-reps-tension');
        if (subSetsSolar) subSetsSolar.textContent = `${(0.05 + (setsStage / 240)).toFixed(3)}`;
        if (subRepsTension) subRepsTension.textContent = `${(14.2 + (repsStage * 0.8)).toFixed(1)}`;
    }

    // =========================================================================
    // 5. MOTOR DE TELEMETRÍA HIPERREALISTA (SCROLL + LENTE COAXIAL)
    // =========================================================================
    const TELEMETRY_MEANINGS = {
        'sub-sets-solar': "Frecuencia de resonancia",
        'sub-reps-tension': "Índice de cohesión molecular",
        'tele-col': "Temperatura de Colonizacion",
        'tele-fru': "Parámetros de maduración",
        'tele-sec': "Ciclo de deshidratación",
        'tele-mol': "Valor de adquisición"
    };

    let scrollTimeout = null;

    function habilitarReveladoTelemetria() {
        const viewport = document.getElementById('telemetry-scroll-viewport');
        if (!viewport) return;

        // Detector adaptativo para Scroll táctil o mouse
        viewport.addEventListener('scroll', () => {
            const anchoElemento = viewport.children[0].offsetWidth;
            const maxScrollLeft = viewport.scrollWidth - viewport.clientWidth;

            // CONTROL INTRÍNSECO DE SCROLL INFINITO TÁCTIL
            if (viewport.scrollLeft >= maxScrollLeft - 2) {
                const primerElemento = viewport.children[0];
                viewport.appendChild(primerElemento);
                viewport.style.scrollBehavior = 'auto';
                viewport.scrollLeft = viewport.scrollLeft - anchoElemento;
                viewport.style.scrollBehavior = 'smooth';
            } else if (viewport.scrollLeft <= 2) {
                const ultimoElemento = viewport.children[viewport.children.length - 1];
                viewport.insertBefore(ultimoElemento, viewport.children[0]);
                viewport.style.scrollBehavior = 'auto';
                viewport.scrollLeft = viewport.scrollLeft + anchoElemento;
                viewport.style.scrollBehavior = 'smooth';
            }

            actualizarFocoCentral();
            
            const lens = document.getElementById('telemetry-led-lens');
            if (lens) lens.classList.add('lens-active');

            clearTimeout(scrollTimeout);
            scrollTimeout = setTimeout(() => {
                if (lens) lens.classList.remove('lens-active');
            }, 180);
        });

        // Eventos por clic directo conservan su traslación fluida
        Object.keys(TELEMETRY_MEANINGS).forEach(id => {
            const el = getCachedEl(id);
            if (!el) return;
            el.addEventListener('click', () => {
                const contenedorPadre = el.parentElement;
                const index = Array.from(viewport.children).indexOf(contenedorPadre);
                if (index === -1) return;
                triggerHaptic(6);
                const anchoElemento = contenedorPadre.offsetWidth;
                viewport.scrollTo({
                    left: contenedorPadre.offsetLeft - anchoElemento,
                    behavior: 'smooth'
                });
            });
        });
    }

    function desplazarTelemetria() {
        const viewport = document.getElementById('telemetry-scroll-viewport');
        if (!viewport || viewport.children.length === 0) return;

        triggerHaptic(6);
        const anchoElemento = viewport.children[0].offsetWidth;

        // Desplazamiento nativo suave hacia la derecha
        viewport.scrollBy({
            left: anchoElemento,
            behavior: 'smooth'
        });

        // Bucle infinito: si llega al final del contenedor, reordena los nodos de forma transparente
        setTimeout(() => {
            const maxScrollLeft = viewport.scrollWidth - viewport.clientWidth;
            if (viewport.scrollLeft >= maxScrollLeft - 5) {
                const primerElemento = viewport.children[0];
                viewport.appendChild(primerElemento);
                viewport.style.scrollBehavior = 'auto';
                viewport.scrollLeft = viewport.scrollLeft - anchoElemento;
                viewport.style.scrollBehavior = 'smooth';
            }
            actualizarFocoCentral();
        }, 350);
    }

    function actualizarFocoCentral() {
        const viewport = document.getElementById('telemetry-scroll-viewport');
        const telemetryPuls = document.getElementById('panel-telemetry-puls');
        if (!viewport || !telemetryPuls || viewport.children.length === 0) return;

        const viewportCenter = viewport.scrollLeft + (viewport.clientWidth / 2);
        let nodoCercano = null;
        let menorDistancia = Infinity;

        // Cálculo geométrico del nodo más cercano al eje óptico central del dispositivo
        Array.from(viewport.children).forEach((nodo) => {
            const nodoCenter = nodo.offsetLeft + (nodo.offsetWidth / 2);
            const distancia = Math.abs(viewportCenter - nodoCenter);

            if (distancia < menorDistancia) {
                menorDistancia = distancia;
                nodoCercano = nodo;
            }
        });

        if (!nodoCercano) return;

        const spanDato = nodoCercano.querySelector('span[id]');
        if (spanDato && TELEMETRY_MEANINGS[spanDato.id]) {
            telemetryPuls.textContent = TELEMETRY_MEANINGS[spanDato.id].toUpperCase();
        }

        // LÓGICA DE COMPORTAMIENTO SEPARADA EXCLUSIVAMENTE AL FRONTEND (CSS)
        Array.from(viewport.children).forEach((nodo) => {
            if (nodo === nodoCercano) {
                nodo.classList.add('node-central-active');
            } else {
                nodo.classList.remove('node-central-active');
            }
        });
    }

    // =========================================================================
    // 6. PAYLOAD DE ADQUISICIÓN WHATSAPP
    // =========================================================================
    function adquirirNodo() {
        const variantConfig = BIORUSH_CATALOG[currentBioVariant];
        const currentCoord = getCachedEl('z-dial')?.textContent || "N/A";
        
        const freqValue = getCachedEl('sub-sets-solar')?.textContent || "0.00 Hz";
        const tensionValue = getCachedEl('sub-reps-tension')?.textContent || "0.0 N";
        
        const dialInterpretation = currentCoord.replace(/(\d+)([A-Z]+)(\d+)/, "$1 FASES, $3 NODOS - ESTADO $2");
        
        const mensaje = `⚡ *ORDEN - BIORUSH* ⚡\n\n` +
                        `• *Vector:* PULSOR ${currentBioVariant}\n` +
                        `• *Carga:* ${variantConfig.spec}\n` +
                        `• *ID:* \`${variantConfig.id}\`\n` +
                        `• *Precio:* ${variantConfig.price}\n\n` +
                        `--- *LENGUAJE BIOCINÉTICO* ---\n` +
                        `• *Matriz de Configuración:* \`${currentCoord}\`\n` +
                        `• *Análisis de Estado:* ${dialInterpretation}\n` +
                        `• *Resonancia:* \`${freqValue}\`\n` +
                        `• *Cohesión:* \`${tensionValue}\`\n\n` +
                        `Activar configuración actual.`;

        triggerHaptic([15, 40, 15]);
        window.open(`https://api.whatsapp.com/send?phone=${numeroCelular}&text=${encodeURIComponent(mensaje)}`, '_blank');
    }

    document.addEventListener('DOMContentLoaded', () => {
        inicializarBioRush();
        updateZ(); 
        setInterval(updateZ, 1000);
        habilitarReveladoTelemetria();
        
        // DISPARADOR ÓPTICO INICIAL
        setTimeout(() => {
            actualizarFocoCentral();
        }, 100);
    });
</script>
