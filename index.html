<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <link class="icon" type="image/png" href="img/favicon.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JAKO VAULT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Plus+Jakarta+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = { 
            theme: { 
                extend: { 
                    screens: { 'xs': '400px' },
                    colors: { 
                        'jako-bg': 'var(--jako-bg)',
                        'jako-text': 'var(--jako-text)',
                        'jako-border': 'var(--jako-border)',
                        'jako-glass': 'var(--jako-glass)',
                        'jako-led': 'var(--jako-led)',
                    },
                    fontFamily: { 
                        'sans': ['Orbitron', 'sans-serif'],
                        'mono': ['Orbitron', 'monospace'],
                        'body': ['Plus Jakarta Sans', 'sans-serif']
                    }
                }
            }
        }
    </script>
    <style>
        :root[data-theme="dark"] {
            --jako-bg: rgba(18, 18, 18, 0.95); /* Ultra-dark mineral gray */
            --jako-text: #ffffff;
            --jako-border: rgba(255, 255, 255, 0.02);
            --jako-glass: rgba(0, 0, 0, 0.6);
            --jako-led: rgba(240, 240, 240, 0.8); /* Pure white with matte diffusion */
            --gradient-start: rgba(255, 255, 255, 0.02);
            --gradient-mid: rgba(10, 10, 10, 0.9);
            --gradient-end: #000000;
        }

        body { 
            overscroll-behavior: none;
            background-color: var(--jako-bg);
        }

        #page-bg-overlay {
            background: radial-gradient(circle at 50% 50%, var(--gradient-start) 15%, var(--gradient-mid) 80%, var(--gradient-end) 100%);
        }

        .border-custom { border-color: rgba(255, 255, 255, 0.15); }
        .border-custom:hover { border-color: rgba(255, 255, 255, 0.6); }

        /* UPPER BEZEL (FOOTER) - Captures light from above (Deep frosted glass effect) */
        .glass-footer { 
            background: rgba(10, 10, 10, 0.45); /* Subtle background to let waves pass through */
            border-top: 1px solid rgba(255, 255, 255, 0.12); 
            box-shadow: inset 0 1px 0px rgba(255, 255, 255, 0.08); /* Double light edge */
            backdrop-filter: blur(40px) saturate(120%); 
            -webkit-backdrop-filter: blur(40px) saturate(120%);
        }

        /* LOWER BEZEL (HEADER) - Exact mirror, captures light from below */
        .glass-header { 
            background: rgba(10, 10, 10, 0.45); 
            border-bottom: 1px solid rgba(255, 255, 255, 0.12); 
            box-shadow: inset 0 -1px 0px rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(40px) saturate(120%); 
            -webkit-backdrop-filter: blur(40px) saturate(120%);
        }

        /* Progressive fade mask for the background SVG */
        #fullscreen-wave-svg {
            z-index: 0;
            mask-image: radial-gradient(circle at 50% 50%, black 25%, rgba(0,0,0,0.8) 50%, transparent 88%);
            -webkit-mask-image: radial-gradient(circle at 50% 50%, black 25%, rgba(0,0,0,0.8) 50%, transparent 88%);
        }

        #main-vault, header, footer {
            position: relative;
            z-index: 10;
        }
    </style>
</head>
<body class="antialiased selection:bg-jako-text selection:text-jako-bg overflow-hidden h-screen w-screen transition-colors duration-500 text-jako-text font-body">

    <!-- Three seamlessly integrated blocks inside the same gradient background div -->
    <div id="page-bg-overlay" class="fixed inset-0 z-10 translate-z-0 flex flex-col justify-between h-full w-full">

        <!-- Expansive SVG canvas for background waves (Coordinate center at 500,500) -->
        <svg id="fullscreen-wave-svg" viewBox="0 0 1000 1000" class="absolute inset-0 w-full h-full pointer-events-none fill-none stroke-current text-white z-0 overflow-visible">
            <g id="wave-quantum-container" class="-rotate-90 origin-[500px_500px]"></g>
        </svg>

        <!-- Block 1: Brand Identity (Header with Lower Bezel) -->
        <header class="w-full shrink-0 z-50 py-5 px-9 flex justify-center items-center glass-header">
            <div class="w-full max-w-[480px] sm:max-w-[675px] flex items-center justify-between gap-3">
                <div class="opacity-0 p-3 text-[13.5px] font-mono leading-none select-none">◀</div>
                
                <div class="flex items-center justify-center gap-2 w-full max-w-[270px]"> 
                    <!-- Unique logo icon with subtle drop shadow filter -->
                    <img src="img/lift.png" alt="Back" class="h-[28px] sm:h-[28px] w-auto object-contain filter drop-shadow-[0_0_1px_rgba(255,255,255,0.3)]" />
                    
                    <!-- Branded engraved text using Orbitron Monospace font -->
                    <span class="jako-led text-[14px] md:text-[17px] tracking-[0.3em] uppercase font-sans">BIORUSH</span>
                </div>

                <div class="opacity-0 p-3 text-[13.5px] font-mono leading-none select-none">▶</div>
            </div>
        </header>

        <!-- Block 2: Central Interaction Panel (Frosted Circular Acrylic) -->
        <main id="main-vault" class="flex-1 w-full flex items-center justify-center relative overflow-hidden z-10 px-6">
            <div id="artepanel-pack-container" class="relative w-[50vw] h-[50vw] sm:w-[50vw] sm:h-[50vw] md:w-[30vh] md:h-[30vh] max-w-[300px] max-h-[300px] min-w-[225px] min-h-[225px] aspect-square shrink-0 rounded-full overflow-hidden [clip-path:circle(50%)] isolate translate-z-0 drop-shadow-[0_25px_60px_rgba(0,0,0,0.95)] cursor-pointer">
                <div id="artepanel-mask-wrapper" class="w-full h-full relative overflow-hidden [clip-path:circle(50%)] transition-all duration-500 bg-cover bg-center" style="background-image: url('img/45caps.png');">
                    
                    <div class="absolute inset-0 flex items-center justify-center p-5 z-20">
                        <svg id="laser-vector-target" viewBox="0 0 400 400" class="w-full h-full fill-none stroke-current text-white transition-all duration-500 origin-center">
                            
                            <!-- NEW: Local Active Waves over the packaging (Hidden by default) -->
                            <g id="local-active-waves" class="origin-center -rotate-90 transition-all duration-500 opacity-0 pointer-events-none" style="transform-origin: 200px 200px;"></g>

                            <g id="sandwatch-group" class="origin-center opacity-100 transition-all duration-500 style-gpu">
                                <path d="M 90,90 L 310,90 L 90,310 L 310,310 Z" class="stroke-white/10" stroke-width="3" />
                                <path d="M 90,90 Q 200,130 310,90" class="stroke-white/10" stroke-width="3" />
                                <path d="M 90,310 Q 200,270 310,310" stroke-dasharray="4 4" class="stroke-white/15" stroke-width="3" />
                                <text id="z-dial" x="200" y="220" text-anchor="middle" class="jako-led fill-white font-black text-[39px] tracking-[0.3em] font-sans">1P1</text>
                            </g>
                        </svg>
                    </div>

                </div>
            </div>
        </main>

        <!-- Block 3: Variant Navigation & Control (Footer with Upper Bezel and Aligned Elements) -->
        <footer class="w-full shrink-0 z-50 py-5 px-9 flex justify-center items-center glass-footer">
            <div class="w-full max-w-[480px] sm:max-w-[675px] flex items-center justify-between gap-3">
                <button onclick="navigateVariant(-1)" class="opacity-50 hover:opacity-100 transition-opacity duration-300 p-3 text-[13.5px] font-mono leading-none text-white shrink-0">◀</button>
                <div class="flex-1 flex justify-center items-center min-w-0">
                    <svg class="w-full max-w-[270px] h-6 fill-none" viewBox="0 0 200 16">
                        <!-- Variant text using Orbitron Monospace font -->
                        <text id="laser-variant-title-footer" x="50%" y="13" text-anchor="middle" class="jako-led fill-current font-mono text-[7px] md:text-[9px] tracking-[0.3em] uppercase transition-all duration-500 font-mono">
                            PULSOR FOCUS
                        </text>
                    </svg>
                </div>
                <button id="biorush-variants-container" onclick="navigateVariant(1)" class="opacity-50 hover:opacity-100 transition-opacity duration-300 p-3 text-[13.5px] font-mono leading-none text-white shrink-0">▶</button>
            </div>
        </footer>

    </div>

    <script>

        // =========================================================================
        // 1. BIORUSH LINEAR VARIANT CATALOG CONFIGURATION
        // =========================================================================
        const BIORUSH_CATALOG = {
            'FOCUS': { 
                label: 'PULSOR FOCUS', desc: 'Focus and cognitive clarity', 
                spec: 'LION’S MANE', cant: '45X500MGRS', price: '$70MIL', id: 'PULS45F',
                img: 'img/45caps.png', imgBack: 'img/45mane.png', imgRaw: 'img/maneRaw.png',
                telemetry: { COL: '24°', FRU: '18°', SEC: '40°' },
                benefits: ['NEUROGENESIS', 'COGNITIVE CLARITY', 'FLUID MEMORY', 'SYNAPTIC OPTIMIZATION', 'DEEP FOCUS']
            },
            'ZEN': { 
                label: 'PULSOR ZEN', desc: 'Optimal mental silence', 
                spec: 'REISHI', cant: '45X500MGRS', price: '$70MIL', id: 'PULS45Z',
                img: 'img/45caps.png', imgBack: 'img/45reishi.png', imgRaw: 'img/reishiRaw.png',
                telemetry: { COL: '22°', FRU: '16°', SEC: '38°' },
                benefits: ['CORTISOL REDUCTION', 'DEEP CALM', 'NERVOUS SYSTEM REGULATION', 'RESTORATIVE SLEEP', 'STRESS ADAPTATION']
            },
            'STAMINA': { 
                label: 'PULSOR STAMINA', desc: 'Optimal cellular power', 
                spec: 'CORDYCEPS', cant: '45X500MGRS', price: '$70MIL', id: 'PULS45S',
                img: 'img/45caps.png', imgBack: 'img/45cordy.png', imgRaw: 'img/cordyRaw.png',
                telemetry: { COL: '20°', FRU: '15°', SEC: '42°' },
                benefits: ['AEROBIC CAPACITY', 'CELLULAR ENERGY (ATP)', 'PHYSICAL ENDURANCE', 'BLOOD OXYGENATION', 'RAPID RECOVERY']
            },
            'CORE': { 
                label: 'PULSOR CORE', desc: 'Optimal immune response', 
                spec: 'TURKEY TAIL', cant: '45X500MGRS', price: '$70MIL', id: 'PULS45C',
                img: 'img/45caps.png', imgBack: 'img/45turkey.png', imgRaw: 'img/turkeyRaw.png',
                telemetry: { COL: '23°', FRU: '19°', SEC: '40°' },
                benefits: ['IMMUNE RESPONSE', 'GUT MICROBIOME', 'CELLULAR DEFENSE', 'ANTIOXIDANT', 'SYSTEMIC PROTECTION']
            }
        };

        let currentBioVariant = 'FOCUS';

        // Handles cyclical catalog switching and updates UI labels
        function navigateVariant(direction) {
            const variantsKeys = Object.keys(BIORUSH_CATALOG);
            let currentIndex = variantsKeys.indexOf(currentBioVariant);
            currentIndex = (currentIndex + direction + variantsKeys.length) % variantsKeys.length;
            currentBioVariant = variantsKeys[currentIndex];
            
            const labelTitleFooter = $('laser-variant-title-footer');
            if (labelTitleFooter) {
                labelTitleFooter.textContent = BIORUSH_CATALOG[currentBioVariant].label;
            }
            if (navigator.vibrate) navigator.vibrate(8);
        }

        // Mapping system metrics index to circular clock anchors
        const VECTOR_TO_CLOCK_INDEX = {
            'P': 1,  'U': 2,  'L': 3,  'S': 4,
            'PL': 5, 'PU': 6, 'LU': 7, 'SU': 8,
            'PUL': 9,'LPS': 10,'SPU': 11,'ULS': 12
        };

        let biokineticWaveHistory = [];
        let isDialTextRevealed = true;
        const $ = id => document.getElementById(id);

        // =========================================================================
        // 2. BIOKINETIC WAVE RENDERING ENGINE (Optimized Responsiveness)
        // =========================================================================
        function renderBiokineticWaves() {
            const container = $('wave-quantum-container');
            const svgElement = $('fullscreen-wave-svg');
            const packContainer = $('artepanel-pack-container');
            
            if (!container || !svgElement || !packContainer || biokineticWaveHistory.length === 0) return;

            // Get viewport spatial dimensions
            const svgRect = svgElement.getBoundingClientRect();
            const packRect = packContainer.getBoundingClientRect();
            
            // Map physical screen pixels to the 1000x1000 virtual coordinate space of the SVG
            const pixelToSvgRatio = 1000 / svgRect.width;
            
            // Calculate start radius precisely matching the outer rim of the product disk
            const startRadius = (packRect.width / 2) * pixelToSvgRatio;

            // Get the limiting viewport axis to avoid abrupt edge clipping on responsive profiles
            const viewportLimitPixels = Math.min(window.innerWidth, window.innerHeight);
            
            // Virtualized maximum radius threshold for fading boundary zones
            const maxAllowedRadius = (viewportLimitPixels / 2) * pixelToSvgRatio * 0.95;

            let htmlContent = '';
            biokineticWaveHistory.forEach((dial, tIndex) => {
                // Decay opacity gradually over wave age
                const baseOpacity = 0.24 - (tIndex * 0.008);
                if (baseOpacity <= 0) return;

                // Physics values for speed and distance between secondary rings
                const expansionStep = 22;    // Distance pushed outward per second
                const subLayerGap = 11;       // Fixed distance between concurrent rings
                
                const layers = [
                    { id: 'internal',     r: startRadius + (tIndex * expansionStep) + 0,                  opacityMult: 0.85, value: dial.sets },
                    { id: 'intermediate', r: startRadius + (tIndex * expansionStep) + subLayerGap,        opacityMult: 0.65, value: dial.vector },
                    { id: 'external',     r: startRadius + (tIndex * expansionStep) + (subLayerGap * 2),  opacityMult: 0.45, value: dial.reps }
                ];

                layers.forEach(layer => {
                    if (layer.r <= 0) return;

                    // Calculate soft radial fade out on window edge boundaries
                    let boundaryFade = 1.0;
                    const fadeZoneStart = maxAllowedRadius * 0.70; // Fade out begins at 70% threshold

                    if (layer.r > fadeZoneStart) {
                        boundaryFade = Math.max(0, 1 - (layer.r - fadeZoneStart) / (maxAllowedRadius - fadeZoneStart));
                    }

                    // Combined calculation of age opacity, radial decay, and layout boundaries
                    const finalOpacity = baseOpacity * layer.opacityMult * boundaryFade;
                    if (finalOpacity <= 0.005) return; // Ignore invisible rings to spare CPU/GPU cycles

                    const circumference = 2 * Math.PI * layer.r;
                    const angle = (layer.value - 1) * 30; 
                    const arcLength = (layer.value / 12) * circumference;
                    const dashArray = `${arcLength} ${circumference}`;

                    htmlContent += `
                        <circle 
                            id="wave-${layer.id}-t${tIndex}" 
                            cx="500" 
                            cy="500" 
                            r="${layer.r}" 
                            transform="rotate(${angle} 500 500)"
                            class="border-custom"
                            stroke-width="2.6"
                            stroke-opacity="${finalOpacity}"
                            stroke-dasharray="${dashArray}"
                            stroke-linecap="round"
                            fill="none"
                        />`;
                });
            });
            container.innerHTML = htmlContent;
        }

// =========================================================================
        // NEW: RENDER LOCAL ACTIVE WAVES DIRECTLY ON THE PACKAGING SURFACE
        // =========================================================================
        function renderLocalActiveWaves(currentDial) {
            const localContainer = $('local-active-waves');
            if (!localContainer || !currentDial) return;

            // Fixed radii selected to sit beautifully inside the circular container (400x400 viewport)
            const layers = [
                { id: 'local-internal',     r: 110, opacity: 0.75, value: currentDial.sets },
                { id: 'local-intermediate', r: 135, opacity: 0.50, value: currentDial.vector },
                { id: 'local-external',     r: 160, opacity: 0.30, value: currentDial.reps }
            ];

            let htmlContent = '';
            layers.forEach(layer => {
                const circumference = 2 * Math.PI * layer.r;
                const angle = (layer.value - 1) * 30; // Clock alignment based on value
                const arcLength = (layer.value / 12) * circumference;
                const dashArray = `${arcLength} ${circumference}`;

                htmlContent += `
                    <circle 
                        id="${layer.id}" 
                        cx="200" 
                        cy="200" 
                        r="${layer.r}" 
                        transform="rotate(${angle} 200 200)"
                        stroke="rgba(255, 255, 255, 0.85)"
                        stroke-width="3"
                        stroke-opacity="${layer.opacity}"
                        stroke-dasharray="${dashArray}"
                        stroke-linecap="round"
                        fill="none"
                        class="transition-all duration-300 ease-out"
                    />`;
            });

            localContainer.innerHTML = htmlContent;
        }

 // =========================================================================
        // 3. SYSTEM TELEMETRY / BIOMETRICS UPDATER (1s Frequency)
        // =========================================================================
        function updateZ() {
            const now = new Date();
            const minutes = now.getMinutes();
            const seconds = now.getSeconds();

            let setsStage = 1;  
            let repsStage = 1;  
            let currentAction = 'P'; 

            if (seconds % 2 !== 0) {
                const progress1s = now.getMilliseconds() / 1000; 
                setsStage = Math.floor(progress1s * 12) + 1;
                repsStage = 13 - setsStage; 
                if (progress1s < 0.25) currentAction = 'P';
                else if (progress1s < 0.5) currentAction = 'U';
                else if (progress1s < 0.75) currentAction = 'L';
                else currentAction = 'S';
            } else {
                setsStage = Math.floor((minutes % 12) + 1);
                if (seconds < 30) {
                    const subSlot = Math.floor((seconds % 30) / 7.5);
                    currentAction = ["PL", "PU", "LU", "SU"][subSlot] || "PL";
                    repsStage = Math.floor((seconds % 10) + 2);
                } else {
                    const subSlot = Math.floor(((seconds - 30) % 30) / 7.5);
                    currentAction = ["PUL", "LPS", "SPU", "ULS"][subSlot] || "ULS";
                    repsStage = Math.floor(((seconds - 30) % 10) + 3);
                }
            }
            
            setsStage = Math.max(1, Math.min(12, setsStage));
            repsStage = Math.max(1, Math.min(12, repsStage));
            const biokineticCoordinate = `${setsStage}${currentAction}${repsStage}`;
            const vectorIndex = VECTOR_TO_CLOCK_INDEX[currentAction] || 1;

            const currentDataPoint = { sets: setsStage, vector: vectorIndex, reps: repsStage, rawCoord: biokineticCoordinate };

            const lastSavedDial = biokineticWaveHistory[0];
            if (!lastSavedDial || lastSavedDial.rawCoord !== biokineticCoordinate) {
                biokineticWaveHistory.unshift(currentDataPoint);
                if (biokineticWaveHistory.length > 28) biokineticWaveHistory.pop(); // Upgraded limit depth for density
            }

            // Render background environmental waves
            renderBiokineticWaves();
            
            // NEW: Always update the localized active wave data in real time
            renderLocalActiveWaves(currentDataPoint);

            const elDial = $('z-dial');
            const elDialHud = $('z-dial-hud');
            if (elDial) elDial.textContent = biokineticCoordinate;
            if (elDialHud) elDialHud.textContent = biokineticCoordinate;
        }

        // Initialize state event loops and click handlers
        document.addEventListener('DOMContentLoaded', () => {
            updateZ();
            setInterval(updateZ, 1000);

            const container = $('artepanel-pack-container');
            if (container) {
                container.addEventListener('click', () => {
                    isDialTextRevealed = !isDialTextRevealed;
                    
                    const sandwatchGroup = $('sandwatch-group');
                    const localActiveWaves = $('local-active-waves');

                    if (isDialTextRevealed) {
                        // Show central dial text / Hide overlapping face waves
                        if (sandwatchGroup) {
                            sandwatchGroup.style.opacity = "1";
                            sandwatchGroup.style.pointerEvents = "auto";
                        }
                        if (localActiveWaves) {
                            localActiveWaves.style.opacity = "0";
                        }
                    } else {
                        // Hide central dial text / Reveal active face waves over the packaging
                        if (sandwatchGroup) {
                            sandwatchGroup.style.opacity = "0.03"; 
                            sandwatchGroup.style.pointerEvents = "none";
                        }
                        if (localActiveWaves) {
                            localActiveWaves.style.opacity = "1";
                        }
                    }
                    
                    // Refresh environmental background waves
                    renderBiokineticWaves();
                    if (navigator.vibrate) navigator.vibrate(10);
                });
            }
        });
    </script>
</body>
</html>
