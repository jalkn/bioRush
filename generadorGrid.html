<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>BIORUSH // Grid Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Plus+Jakarta+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <style>
        /* Estilos sincronizados con el ecosistema Zenergy/BIORUSH */
        body { font-family: 'Orbitron', sans-serif; background-color: #020617; color: white; }
        
        .grid-master { 
            width: 1080px; height: 1080px; /* Formato cuadrado para grid perfecto */
            background: radial-gradient(circle at 50% 50%, #172554 0%, #0f172a 50%, #020617 100%);
            position: relative; overflow: hidden; padding: 40px;
        }
        
        .grid-cell { border: 1px solid rgba(255,255,255,0.05); }
    </style>
</head>
<body class="p-10 flex flex-col items-center">

    <!-- PANEL DE CONTROL (No exporta) -->
    <div class="mb-10 w-full max-w-lg bg-black/90 p-6 border border-sky-900">
        <h1 class="text-[10px] tracking-[0.3em] text-sky-500 mb-4 uppercase">Generador Grid 3x3 - Protocolo P.U.L.S.</h1>
        <button onclick="exportarGrid()" class="w-full bg-sky-950 border border-sky-500 py-3 text-[10px] tracking-[0.3em] hover:bg-sky-500/20">EXPORTAR MATRIZ (9 PIEZAS)</button>
    </div>

    <!-- EL MASTER: Diseño que se va a fragmentar -->
    <div id="grid-master" class="grid-master grid grid-cols-3 grid-rows-3">
        <!-- Ejemplo de diseño interno con tu estilo -->
        <div class="col-span-3 row-span-3 flex flex-col items-center justify-center gap-4">
            <h1 class="text-7xl font-black tracking-tighter">BIORUSH</h1>
            <div class="w-48 h-48 border border-white/10 rounded-full"></div>
            <p class="text-xs tracking-[0.5em] text-white/40">SINERGIA MOLECULAR</p>
        </div>
    </div>

    <script>
        async function exportarGrid() {
            const master = document.getElementById('grid-master');
            const canvas = await html2canvas(master, { backgroundColor: null });
            const ctx = canvas.getContext('2d');
            
            const size = canvas.width / 3; // 360px por celda

            for (let y = 0; y < 3; y++) {
                for (let x = 0; x < 3; x++) {
                    const mini = document.createElement('canvas');
                    mini.width = size;
                    mini.height = size;
                    mini.getContext('2d').drawImage(canvas, x * size, y * size, size, size, 0, 0, size, size);
                    
                    const link = document.createElement('a');
                    link.download = `biorush_grid_${y}_${x}.png`;
                    link.href = mini.toDataURL("image/png");
                    link.click();
                }
            }
        }
    </script>
</body>
</html>
